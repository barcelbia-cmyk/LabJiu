const CAMP_DEFAULT_CFG={startDate:"2026-07-06",startWeight:66.6,weighInDate:"2026-07-25",targetWeight:62,phase1Days:12,phase1Fraction:0.75};
function computeCampExpected(dateStr,cfg){
  const start=new Date(cfg.startDate+"T00:00:00");
  const end=new Date(cfg.weighInDate+"T00:00:00");
  const d=new Date(dateStr+"T00:00:00");
  const totalDays=Math.max(1,(end-start)/86400000);
  const totalLoss=cfg.startWeight-cfg.targetWeight;
  const p1Days=Math.min(cfg.phase1Days,totalDays);
  const p1Loss=totalLoss*cfg.phase1Fraction;
  const p2Days=Math.max(1,totalDays-p1Days);
  const p2Loss=totalLoss-p1Loss;
  const elapsed=Math.max(0,Math.min(totalDays,(d-start)/86400000));
  if(elapsed<=p1Days)return cfg.startWeight-(p1Loss*(elapsed/p1Days));
  const e2=elapsed-p1Days;
  return(cfg.startWeight-p1Loss)-(p2Loss*(e2/p2Days));
}
function CampCard({user}){
  const I={width:"100%",background:T.inpBg,border:`1px solid ${T.border}`,borderRadius:10,color:T.text,padding:"9px 11px",fontSize:14,outline:"none",minHeight:42,boxSizing:"border-box"};
  const[cfg,setCfg]=useState(CAMP_DEFAULT_CFG);
  const[entries,setEntries]=useState([]);
  const[inp,setInp]=useState("");
  const[showCfg,setShowCfg]=useState(false);
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    (async()=>{
      const c=await sGet(sk(user.id,"camp_config"),CAMP_DEFAULT_CFG);
      const e=await sGet(sk(user.id,"camp_weights"),[]);
      setCfg({...CAMP_DEFAULT_CFG,...(c||{})});
      setEntries((e||[]).sort((a,b)=>a.date.localeCompare(b.date)));
      setLoaded(true);
    })();
  },[user.id]);

  if(!loaded)return null;

  const today=todayStr();
  const daysLeft=Math.ceil((new Date(cfg.weighInDate)-new Date(today))/86400000);
  const expectedToday=computeCampExpected(today,cfg).toFixed(1);
  const todayEntry=entries.find(e=>e.date===today);
  const lastEntry=entries[entries.length-1];

  const saveCfg=async(patch)=>{const nc={...cfg,...patch};setCfg(nc);await sSet(sk(user.id,"camp_config"),nc);};
  const saveWeight=async()=>{
    const w=parseFloat(inp.replace(",","."));
    if(isNaN(w)||w<30||w>200){window.__toast?.("Peso inválido");return;}
    const nl=[...entries.filter(e=>e.date!==today),{date:today,weight:w}].sort((a,b)=>a.date.localeCompare(b.date));
    setEntries(nl);setInp("");
    await sSet(sk(user.id,"camp_weights"),nl);
    window.__toast?.("Peso de hoje registrado");
  };
  const delEntry=async(date)=>{
    const nl=entries.filter(e=>e.date!==date);
    setEntries(nl);
    await sSet(sk(user.id,"camp_weights"),nl);
  };

  const exportText=()=>{
    let txt=`ACOMPANHAMENTO DE CAMP — ${user.name}\n`;
    txt+=`Início do plano: ${cfg.startWeight}kg em ${cfg.startDate}\n`;
    txt+=`Pesagem: ${cfg.weighInDate} (kimono)\n`;
    txt+=`Meta: ${cfg.targetWeight}kg\n`;
    txt+=`Dias restantes: ${daysLeft}\n\n`;
    txt+=`DATA        REAL     ESPERADO   DIF\n`;
    entries.forEach(e=>{
      const exp=computeCampExpected(e.date,cfg).toFixed(1);
      const dif=(e.weight-exp).toFixed(1);
      txt+=`${e.date}  ${e.weight.toFixed(1).padStart(5)}   ${exp.padStart(5)}     ${dif>0?"+":""}${dif}\n`;
    });
    return txt;
  };
  const doExport=async()=>{
    const txt=exportText();
    try{
      await navigator.clipboard.writeText(txt);
      window.__toast?.("Copiado! Cola aqui no chat");
    }catch{
      const blob=new Blob([txt],{type:"text/plain"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=`camp_${user.name.toLowerCase()}_${today}.txt`;a.click();
      URL.revokeObjectURL(url);
      window.__toast?.("Baixado — envia o arquivo aqui no chat");
    }
  };

  return(
    <div style={{background:T.card,border:`1.5px solid ${user.accent}40`,borderRadius:14,padding:16,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:user.accent}}>🥊 Camp — {daysLeft}{daysLeft===1?" dia":" dias"} p/ pesagem</div>
        <button onClick={()=>setShowCfg(s=>!s)} style={{background:"transparent",border:"none",color:T.muted,fontSize:13,cursor:"pointer"}}>⚙</button>
      </div>

      {showCfg&&<div style={{background:T.inpBg,borderRadius:10,padding:10,marginBottom:12,display:"flex",gap:8,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:130}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:4}}>Início do plano</div>
          <input type="date" value={cfg.startDate} onChange={e=>saveCfg({startDate:e.target.value})} style={{...I,minHeight:38}}/>
        </div>
        <div style={{flex:1,minWidth:100}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:4}}>Peso inicial (kg)</div>
          <input value={cfg.startWeight} onChange={e=>saveCfg({startWeight:parseFloat(e.target.value)||cfg.startWeight})} inputMode="decimal" style={{...I,minHeight:38}}/>
        </div>
        <div style={{flex:1,minWidth:130}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:4}}>Data da pesagem</div>
          <input type="date" value={cfg.weighInDate} onChange={e=>saveCfg({weighInDate:e.target.value})} style={{...I,minHeight:38}}/>
        </div>
        <div style={{flex:1,minWidth:100}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:4}}>Meta (kg)</div>
          <input value={cfg.targetWeight} onChange={e=>saveCfg({targetWeight:parseFloat(e.target.value)||cfg.targetWeight})} inputMode="decimal" style={{...I,minHeight:38}}/>
        </div>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:T.inpBg,borderRadius:9,padding:"9px 8px",textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:user.accent,fontFamily:"'JetBrains Mono',monospace"}}>{lastEntry?lastEntry.weight:"—"}</div>
          <div style={{fontSize:9,color:T.muted,marginTop:2}}>último peso</div>
        </div>
        <div style={{background:T.inpBg,borderRadius:9,padding:"9px 8px",textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:T.text,fontFamily:"'JetBrains Mono',monospace"}}>{expectedToday??"—"}</div>
          <div style={{fontSize:9,color:T.muted,marginTop:2}}>esperado hoje</div>
        </div>
        <div style={{background:T.inpBg,borderRadius:9,padding:"9px 8px",textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:T.done,fontFamily:"'JetBrains Mono',monospace"}}>{cfg.targetWeight}</div>
          <div style={{fontSize:9,color:T.muted,marginTop:2}}>meta pesagem</div>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input value={todayEntry?String(todayEntry.weight):inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveWeight()} placeholder="Peso em jejum hoje (kg)" inputMode="decimal" style={{...I,flex:1}}/>
        <button onClick={saveWeight} style={{padding:"0 16px",borderRadius:10,border:"none",background:user.accent,color:"#FFF",fontSize:13,fontWeight:700,cursor:"pointer"}}>Salvar</button>
      </div>

      {entries.length>0&&<div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:T.muted,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Histórico ({entries.length})</div>
        <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:180,overflowY:"auto"}}>
          {[...entries].reverse().map(e=>{
            const exp=parseFloat(computeCampExpected(e.date,cfg).toFixed(1));
            const dif=(e.weight-exp).toFixed(1);
            return(<div key={e.date} style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11,padding:"5px 8px",background:T.inpBg,borderRadius:7}}>
              <span style={{color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>{e.date.slice(5)}</span>
              <span style={{color:T.text,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{e.weight}kg</span>
              <span style={{color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>esp. {exp}</span>
              <span style={{color:parseFloat(dif)>0?"#EF4444":T.done,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{dif>0?"+":""}{dif}</span>
              <button onClick={()=>delEntry(e.date)} style={{background:"transparent",border:"none",color:T.muted,fontSize:14,cursor:"pointer",padding:"0 2px"}}>×</button>
            </div>);
          })}
        </div>
      </div>}

      <button onClick={doExport} style={{width:"100%",padding:10,borderRadius:9,border:`1px solid ${user.accent}`,background:"transparent",color:user.accent,fontSize:12,fontWeight:700,cursor:"pointer"}}>📤 Exportar histórico</button>
    </div>
  );
}

function DashboardView({user,plans,setPillar,setShowSettings}){
  const[data,setData]=useState(null);
  const[checkin,setCheckin]=useState({sono:3,horas:7,disposicao:3,corpo:3});
  const[checkinSaved,setCheckinSaved]=useState(false);
  const[reloadKey,setReloadKey]=useState(0);
  useEffect(()=>{
    sGet(sk(user.id,"checkin",todayStr()),null).then(c=>{if(c){setCheckin(c);setCheckinSaved(true);}else{setCheckin({sono:3,horas:7,disposicao:3,corpo:3});setCheckinSaved(false);}});
  },[user.id]);
  const [checkinDirty,setCheckinDirty]=useState(false);
  const updCheckin=async(newC)=>{
    setCheckin(newC);setCheckinDirty(false);
    await sSet(sk(user.id,"checkin",todayStr()),newC);
    setCheckinSaved(true);
    setReloadKey(k=>k+1);
  };
  const saveCheckin=async(newC)=>{
    setCheckin(newC);
    await sSet(sk(user.id,"checkin",todayStr()),newC);
    window.__toast?.("Check-in de hoje salvo");
    setCheckinSaved(true);setCheckinDirty(false);
    setReloadKey(k=>k+1);
  };
  useEffect(()=>{
    (async()=>{
      const ws=new Date();ws.setDate(ws.getDate()-7);const wsStr=ws.toISOString().split("T")[0];
      // Treinos semana
      const skeys=await sList(sk(user.id,"sess",""));let treinos=0;
      const allTreinoDates=[];
      for(const k of skeys){const s=await sGet(k);if(s){allTreinoDates.push(s.date);if(s.date>=wsStr)treinos++;}}
      // Jiu sessões (lê da estrutura unificada jiu_sessions)
      const jiuSessionsRaw=await sGet(sk(user.id,"jiu_sessions"),[]);
      const jiuLog=jiuSessionsRaw;
      const jiuWeek=jiuLog.filter(s=>s.date>=wsStr);
      const allJiuMeta=jiuSessionsRaw.map(s=>({date:s.date,rolas:(s.rolas||[]).length}));
      const allDatesCombined=[...allTreinoDates,...allJiuMeta.map(j=>j.date)];
      const earliestDate=allDatesCombined.length?allDatesCombined.sort()[0]:null;
      // Nutrição (dias com 3+ refeições)
      let nutriOk=0;
      const nutriMeals=user.id==="G"?MEALS_G:MEALS_B;
      for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];const n=await sGet(sk(user.id,"nutri",ds),null);if(n){const sl=nutriSlots(nutriMeals,n);if(sl.total>0&&sl.done>=Math.ceil(sl.total*0.6))nutriOk++;}}
      // Peso atual + meta
      const pesos=await sGet(sk(user.id,"weight"),[]);
      const pesoAtual=pesos.length?pesos[pesos.length-1].weight:null;
      const pesoAnterior=pesos.length>1?pesos[pesos.length-2].weight:null;
      // Rolas semana (derivado dos rolas embutidos em cada sessão)
      const rolas=jiuSessionsRaw.flatMap(s=>(s.rolas||[]).map(r=>({...r,date:s.date})));
      const rolasWeek=rolas.filter(r=>r.date>=wsStr);
      const winsWeek=rolasWeek.filter(r=>["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"].some(p=>r.resultado?.includes(p)||(r.resultados&&r.resultados[p]>0))).length;
      const rolasByDate={};rolas.forEach(r=>{if(!rolasByDate[r.date])rolasByDate[r.date]=[];rolasByDate[r.date].push(r);});

      // ── Check-ins diários (sono/disposição/corpo — independente de treino) ──
      const checkinsByDate={};
      for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];const c=await sGet(sk(user.id,"checkin",ds),null);if(c)checkinsByDate[ds]=c;}
      const checkinsWeek=Object.entries(checkinsByDate).filter(([ds])=>ds>=wsStr).map(([,c])=>c);
      const avgFadiga=checkinsWeek.length?Math.round(checkinsWeek.reduce((a,f)=>a+((f.sono||0)+(f.disposicao||0)+(f.corpo||0))/3,0)/checkinsWeek.length*2*10)/10:null;

      // Correlações: sono vs rolas (usa check-in do dia, não fadiga da sessão)
      let hW=0,hT=0,lW=0,lT=0;
      Object.entries(rolasByDate).forEach(([ds,dr])=>{
        const c=checkinsByDate[ds];if(!c?.sono)return;
        const w=dr.filter(r=>["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"].some(p=>r.resultado?.includes(p)||(r.resultados&&r.resultados[p]>0))).length;
        if(c.sono>=4){hW+=w;hT+=dr.length;}else{lW+=w;lT+=dr.length;}
      });
      const correlacoes=[];
      if(hT>=5&&lT>=5){const hR=Math.round((hW/hT)*100);const lR=Math.round((lW/lT)*100);correlacoes.push({icon:"😴",title:"Sono → Aproveitamento nos Rolas",desc:`Sono 4-5/5: ${hR}% positivos. Sono 1-3/5: ${lR}% positivos. Diferença: ${Math.abs(hR-lR)}pp.`});}
      const cfg=window.__config||DEF_CFG[user.id];

      // ── Índice de Prontidão ─────────────────────────────────
      // Fator 1: Sono — usa o check-in mais recente (hoje, ou últimos dias)
      const todayCheckin=checkinsByDate[todayStr()];
      const recentCheckin=todayCheckin||Object.entries(checkinsByDate).sort((a,b)=>b[0].localeCompare(a[0]))[0]?.[1];
      const sonoScore=recentCheckin?.sono||3;
      const sonoHoras=recentCheckin?.horas;
      const dispScore=recentCheckin?.disposicao||3;
      const corpoScore=recentCheckin?.corpo||3;
      const sonoFactor=sonoHoras
        ?((sonoScore/5)*0.6+(Math.min(sonoHoras,8)/8)*0.4)*2.5 // combina qualidade (60%) + quantidade (40%), 0–2.5
        :(sonoScore/5)*2.5; // fallback só qualidade

      // Fator 2: Disposição (energia percebida)
      const dispFactor=(dispScore/5)*1.5; // 0–1.5

      // Fator 3: Corpo / dores (5=sem dor, 1=com dor)
      const corpoFactor=(corpoScore/5)*1.0; // 0–1

      // Fator 4: Carga semanal (inversamente proporcional)
      const cargaFactor=Math.max(0,2-(treinos*0.36)); // 0–2

      // Fator 5: Dias consecutivos de treino (recuperação)
      let consec=0;
      for(let i=1;i<=7;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];const hasJiu=jiuLog.some(s=>s.date===ds);let hasGym=false;for(const k of skeys){const s=await sGet(k);if(s&&s.date===ds){hasGym=true;break;}}if(hasJiu||hasGym)consec++;else break;}
      const consecFactor=consec<=1?1.5:consec<=2?1.2:consec<=3?0.8:consec<=4?0.5:0.2; // 0–1.5

      // Fator 6: Nutrição (proteína média últimos 2 dias)
      let protSum=0,protN=0;
      for(let i=1;i<=2;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];const n=await sGet(sk(user.id,"nutri",ds),null);if(n){const k=nutriTotals(user.id==="G"?MEALS_G:MEALS_B,n).prot;if(k>0){protSum+=k;protN++;}}}
      const avgProt2=protN>0?protSum/protN:0;
      const nutFactor=cfg.proteinTarget>0?Math.min(1.5,(avgProt2/cfg.proteinTarget)*1.5):0.9; // 0–1.5

      const readiness=Math.min(10,Math.max(1,Math.round((sonoFactor+dispFactor+corpoFactor+cargaFactor+consecFactor+nutFactor)*10)/10));
      const readinessFactors={sono:sonoScore,sonoHoras,disp:dispScore,corpo:corpoScore,carga:treinos,consec,prot:Math.round(avgProt2),protTarget:cfg.proteinTarget};

      // ── Padrões de Alto Desempenho ──────────────────────────
      const padroes=[];
      if(Object.keys(checkinsByDate).length>=8&&rolas.length>=10){
        if(hT>=4&&lT>=4){
          const hR=Math.round((hW/hT)*100);const lR=Math.round((lW/lT)*100);
          if(Math.abs(hR-lR)>=10) padroes.push({icon:"😴",cond:`Sono 4-5/5`,val:`${hR}% positivos nos rolas`,vs:`vs ${lR}% com sono baixo`});
        }
        // Disposição alta vs baixa (usa check-in do dia do rola)
        let aW=0,aT=0,bW=0,bT=0;
        Object.entries(rolasByDate).forEach(([ds,dr])=>{
          const c=checkinsByDate[ds];if(!c?.disposicao)return;
          const w=dr.filter(r=>["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"].some(p=>r.resultado?.includes(p)||(r.resultados&&r.resultados[p]>0))).length;
          if(c.disposicao>=4){aW+=w;aT+=dr.length;}else if(c.disposicao<=2){bW+=w;bT+=dr.length;}
        });
        if(aT>=4&&bT>=4){
          const aR=Math.round((aW/aT)*100);const bR=Math.round((bW/bT)*100);
          if(Math.abs(aR-bR)>=10) padroes.push({icon:"💪",cond:`Alta disposição (4-5/5)`,val:`${aR}% positivos nos rolas`,vs:`vs ${bR}% com baixa disposição`});
        }
        // Melhor combinação (sono alto + disposição alta)
        let bW2=0,bT2=0,bestN=0;
        Object.entries(rolasByDate).forEach(([ds,dr])=>{
          const c=checkinsByDate[ds];if(!c||c.sono<4||c.disposicao<4)return;
          bestN++;bW2+=dr.filter(r=>["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"].some(p=>r.resultado?.includes(p)||(r.resultados&&r.resultados[p]>0))).length;bT2+=dr.length;
        });
        if(bestN>=3&&bT2>0){
          const bR=Math.round((bW2/bT2)*100);
          padroes.push({icon:"⚡",cond:`Sono ≥4 + Disposição ≥4`,val:`${bR}% aproveitamento (${bestN} dias)`,vs:`seu melhor estado`});
        }
      }

      // ── Resumo Mensal (mês anterior completo) ──────────────
      const monthSummary=await(async()=>{
        const now=new Date();
        const lastMonthDate=new Date(now.getFullYear(),now.getMonth()-1,1);
        const lmStart=new Date(lastMonthDate.getFullYear(),lastMonthDate.getMonth(),1).toISOString().split("T")[0];
        const lmEnd=new Date(lastMonthDate.getFullYear(),lastMonthDate.getMonth()+1,0).toISOString().split("T")[0];
        const monthName=lastMonthDate.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
        // Treinos do mês
        let mTreinos=0;
        for(const k of skeys){const s=await sGet(k);if(s&&s.date>=lmStart&&s.date<=lmEnd)mTreinos++;}
        // Jiu do mês
        const mJiu=jiuLog.filter(s=>s.date>=lmStart&&s.date<=lmEnd);
        // Rolas do mês
        const mRolas=rolas.filter(r=>r.date>=lmStart&&r.date<=lmEnd);
        const POSITIVOS4=["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"];const NEGATIVOS4=["Fui finalizado","Fui raspado","Fui passado","Sofri pegada nas costas","Fui montado"];
        const countR4=(r,list)=>r.resultados?Object.entries(r.resultados).filter(([k])=>list.includes(k)).reduce((a,[,v])=>a+v,0):(list.includes(r.resultado)?1:0);
        const mWins=mRolas.reduce((a,r)=>a+countR4(r,POSITIVOS4),0);
        const mLosses=mRolas.reduce((a,r)=>a+countR4(r,NEGATIVOS4),0);
        const mWinRate=(mWins+mLosses)>0?Math.round((mWins/(mWins+mLosses))*100):null;
        // Peso início/fim do mês
        const mPesos=pesos.filter(p=>p.date>=lmStart&&p.date<=lmEnd).sort((a,b)=>a.date.localeCompare(b.date));
        const pesoIni=mPesos.length?mPesos[0].weight:null;
        const pesoFim=mPesos.length?mPesos[mPesos.length-1].weight:null;
        const pesoDelta=(pesoIni!=null&&pesoFim!=null)?Math.round((pesoFim-pesoIni)*10)/10:null;
        // Nutrição: dias com 3+ refeições no mês
        let mNutriOk=0,mNutriDays=0;
        const lmStartD=new Date(lmStart);const lmEndD=new Date(lmEnd);
        const monthNutriMeals=user.id==="G"?MEALS_G:MEALS_B;
        for(let d=new Date(lmStartD);d<=lmEndD;d.setDate(d.getDate()+1)){const ds=d.toISOString().split("T")[0];const n=await sGet(sk(user.id,"nutri",ds),null);if(n){mNutriDays++;const sl=nutriSlots(monthNutriMeals,n);if(sl.total>0&&sl.done>=Math.ceil(sl.total*0.6))mNutriOk++;}}
        // Melhor e pior semana (por treinos combinados)
        const weekCounts={};
        for(const k of skeys){const s=await sGet(k);if(s&&s.date>=lmStart&&s.date<=lmEnd){const wn=Math.ceil((new Date(s.date)-lmStartD)/(7*864e5));weekCounts[wn]=(weekCounts[wn]||0)+1;}}
        mJiu.forEach(s=>{const wn=Math.ceil((new Date(s.date)-lmStartD)/(7*864e5));weekCounts[wn]=(weekCounts[wn]||0)+1;});
        const weekEntries=Object.entries(weekCounts);
        const bestWeek=weekEntries.length?weekEntries.sort((a,b)=>b[1]-a[1])[0]:null;
        const hasData=mTreinos>0||mJiu.length>0||mRolas.length>0;
        if(!hasData)return null;
        return{monthName,mTreinos,mJiuCount:mJiu.length,mRolasCount:mRolas.length,mWinRate,pesoDelta,mNutriOk,mNutriDays,bestWeekNum:bestWeek?bestWeek[0]:null,bestWeekCount:bestWeek?bestWeek[1]:null};
      })();

      setData({treinos,jiuSess:jiuWeek.length,nutriOk,pesoAtual,pesoAnterior,avgFadiga,rolasWeek:rolasWeek.length,winsWeek,goalWeight:cfg.goalWeight,goalDate:cfg.goalDate,correlacoes,readiness,readinessFactors,padroes,monthSummary,allTreinoDates,allJiuMeta,earliestDate});
    })();
  },[user.id,reloadKey]);

  if(!data)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"60px 0",color:T.muted,fontSize:13}}>Carregando...</div>);

  const daysLeft=data.goalDate?Math.max(0,Math.ceil((new Date(data.goalDate)-new Date())/864e5)):null;
  const pesoTrend=data.pesoAtual&&data.pesoAnterior?data.pesoAtual-data.pesoAnterior:null;

  const Stat=({icon,label,value,sub,color,onClick})=>(<button onClick={onClick} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 12px",textAlign:"left",cursor:onClick?"pointer":"default",width:"100%"}}>
    <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:24,fontWeight:700,color:color||T.text,lineHeight:1,letterSpacing:-0.5}}>{value}</div>
    <div style={{fontSize:11,color:T.muted,marginTop:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:T.sub,marginTop:2}}>{sub}</div>}
  </button>);

  // Insights
  const insights=[];
  if(data.treinos>=3)insights.push({icon:"🔥",text:"Semana consistente na academia!",c:user.accent});
  else if(data.treinos===0)insights.push({icon:"⚠️",text:"Nenhum treino esta semana ainda.",c:"#F59E0B"});
  if(data.jiuSess>=2)insights.push({icon:"🥋",text:`${data.jiuSess} treinos de Jiu — volume bom.`,c:"#EF4444"});
  if(data.nutriOk>=5)insights.push({icon:"🥗",text:"Nutrição em dia — 5+ dias com metas.",c:"#10B981"});
  else if(data.nutriOk<=2)insights.push({icon:"⚠️",text:"Nutrição abaixo — menos de 3 dias ok.",c:"#F59E0B"});
  if(data.avgFadiga&&data.avgFadiga<=5)insights.push({icon:"😴",text:"Fadiga alta nas sessões — priorize o sono.",c:"#8B5CF6"});
  if(data.winsWeek>0&&data.rolasWeek>0){const wr=Math.round((data.winsWeek/data.rolasWeek)*100);insights.push({icon:"⚡",text:`${wr}% de aproveitamento nos rolas da semana.`,c:user.accent});}
  if(pesoTrend!==null){const dir=pesoTrend<0?"↓ ":"↑ ";insights.push({icon:"⚖️",text:`Peso ${dir}${Math.abs(pesoTrend).toFixed(1)}kg desde última medição.`,c:pesoTrend<=0?T.done:"#EF4444"});}

  const today=new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});

  return(<div>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:12,color:T.muted,marginBottom:2,textTransform:"capitalize"}}>{today}</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:700,color:T.text,letterSpacing:-0.5}}>Semana de {user.name}</div>
    </div>

    {/* ── Check-in Diário ─────────────────────────────── */}
    <div style={{background:T.card,border:`1.5px solid ${checkinSaved?T.borderDone:user.accent+"40"}`,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,textTransform:"uppercase"}}>Como você está hoje?</div>
        {checkinSaved&&<span style={{fontSize:11,color:T.done,fontWeight:700}}>✓ Registrado</span>}
      </div>
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:12,color:T.sub}}>Qualidade do sono</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:user.accent,fontWeight:700}}>{checkin.sono}/5</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[1,2,3,4,5].map(n=>(<button key={n} onClick={()=>updCheckin({...checkin,sono:n})} style={{flex:1,height:30,borderRadius:7,border:`1.5px solid ${checkin.sono>=n?user.accent:T.border}`,background:checkin.sono>=n?`${user.accent}18`:T.inpBg,color:checkin.sono>=n?user.accent:T.muted,fontSize:12,fontWeight:checkin.sono>=n?700:400,cursor:"pointer"}}>{n}</button>))}
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:12,color:T.sub}}>Horas dormidas</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:user.accent,fontWeight:700}}>{checkin.horas}h</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={()=>updCheckin({...checkin,horas:Math.max(0,Math.round((checkin.horas-0.5)*10)/10)})} style={{width:30,height:30,borderRadius:7,border:`1px solid ${T.border}`,background:T.inpBg,color:T.text,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
          <div style={{flex:1,height:28,borderRadius:7,background:T.inpBg,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",inset:0,width:`${Math.min(100,(checkin.horas/12)*100)}%`,background:`${user.accent}25`,borderRadius:7,transition:"width 0.2s ease"}}/>
          </div>
          <button onClick={()=>updCheckin({...checkin,horas:Math.min(12,Math.round((checkin.horas+0.5)*10)/10)})} style={{width:30,height:30,borderRadius:7,border:`1px solid ${T.border}`,background:T.inpBg,color:T.text,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:12,color:T.sub}}>Disposição</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:user.accent,fontWeight:700}}>{checkin.disposicao}/5</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[1,2,3,4,5].map(n=>(<button key={n} onClick={()=>updCheckin({...checkin,disposicao:n})} style={{flex:1,height:30,borderRadius:7,border:`1.5px solid ${checkin.disposicao>=n?user.accent:T.border}`,background:checkin.disposicao>=n?`${user.accent}18`:T.inpBg,color:checkin.disposicao>=n?user.accent:T.muted,fontSize:12,fontWeight:checkin.disposicao>=n?700:400,cursor:"pointer"}}>{n}</button>))}
        </div>
      </div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:12,color:T.sub}}>Corpo</span>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:user.accent,fontWeight:700}}>{checkin.corpo}/5</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[1,2,3,4,5].map(n=>(<button key={n} onClick={()=>updCheckin({...checkin,corpo:n})} style={{flex:1,height:30,borderRadius:7,border:`1.5px solid ${checkin.corpo>=n?user.accent:T.border}`,background:checkin.corpo>=n?`${user.accent}18`:T.inpBg,color:checkin.corpo>=n?user.accent:T.muted,fontSize:12,fontWeight:checkin.corpo>=n?700:400,cursor:"pointer"}}>{n}</button>))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
          <span style={{fontSize:9,color:T.muted}}>1 = com dor</span>
          <span style={{fontSize:9,color:T.muted}}>5 = sem dor</span>
        </div>
      </div>
      <button onClick={()=>saveCheckin(checkin)} style={{width:"100%",marginTop:14,padding:12,borderRadius:10,border:"none",background:checkinDirty?user.accent:(checkinSaved?T.done:user.accent),color:"#FFF",fontSize:14,fontWeight:700,cursor:"pointer",minHeight:46}}>{checkinDirty?"💾 Salvar Check-in":checkinSaved?"✓ Salvo — toque para salvar de novo":"💾 Salvar Check-in"}</button>
    </div>

    {user.id==="B"&&<CampCard user={user}/>}

    {/* 4 main stats */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <Stat icon="🏋️" label="Treinos" value={data.treinos} sub="esta semana" color={user.accent} onClick={()=>setPillar("fisico")}/>
      <Stat icon="🥋" label="Jiu" value={data.jiuSess} sub="sessões" color="#EF4444" onClick={()=>setPillar("jiu")}/>
      <Stat icon="🥗" label="Nutrição" value={`${data.nutriOk}/7`} sub="dias com metas" color="#10B981" onClick={()=>setPillar("nutricao")}/>
      <Stat icon="⚡" label="Rolas" value={data.rolasWeek} sub={data.rolasWeek>0?`${data.winsWeek} positivos`:"esta semana"} color="#F59E0B" onClick={()=>setPillar("jiu")}/>
    </div>

    {/* Peso + meta */}
    {data.pesoAtual&&(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Peso Atual</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,color:T.text,letterSpacing:-1}}>{data.pesoAtual}<span style={{fontSize:14,color:T.muted}}>kg</span></span>
            {pesoTrend!==null&&<span style={{fontSize:12,fontWeight:700,color:pesoTrend<=0?T.done:"#EF4444"}}>{pesoTrend>0?"+":""}{pesoTrend.toFixed(1)}kg</span>}
          </div>
        </div>
        {data.goalWeight&&<div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Meta</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:user.accent}}>{data.goalWeight}<span style={{fontSize:13,color:T.muted}}>kg</span></div>
          {daysLeft!==null&&<div style={{fontSize:11,color:T.muted}}>{daysLeft} dias</div>}
        </div>}
      </div>
      {data.goalWeight&&(<div style={{height:6,background:T.inpBg,borderRadius:3}}>
        {(()=>{const start=100;const pct=Math.min(100,Math.max(0,Math.round(((start-data.pesoAtual)/(start-data.goalWeight))*100)));return <div style={{height:"100%",width:`${pct}%`,background:pct>=100?T.done:user.accent,borderRadius:3,transition:"width 0.4s ease"}}/>;})()}
      </div>)}
    </div>)}

    {/* ── Índice de Prontidão ──────────────────────── */}
    {data.readiness!=null&&(()=>{
      const r=data.readiness;
      const f=data.readinessFactors||{};
      const color=r>=8?"#4ADE80":r>=6.5?user.accent:r>=5?"#F97316":"#EF4444";
      const label=r>=8?"Excelente":r>=6.5?"Bom":r>=5?"Moderado":"Baixo";
      const tip=r>=8?"Pode treinar forte hoje.":r>=6.5?"Treino normal — monitore o RPE.":r>=5?"Cuide da intensidade, priorize técnica.":"Considere recuperação ativa ou descanso.";
      return(<div style={{background:T.card,border:`2px solid ${color}30`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:3,textTransform:"uppercase"}}>Índice de Prontidão</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:color}}>{label}</div>
            <div style={{fontSize:12,color:T.sub,marginTop:2}}>{tip}</div>
          </div>
          <div style={{textAlign:"center",minWidth:64}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:40,fontWeight:700,color:color,lineHeight:1,letterSpacing:-2}}>{r.toFixed(1)}</div>
            <div style={{fontSize:10,color:T.muted}}>de 10</div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {[
            {l:"Sono",v:f.sono||0,max:5,fmt:v=>`${v}/5${f.sonoHoras?` · ${f.sonoHoras}h`:""}`},
            {l:"Disposição",v:f.disp||0,max:5,fmt:v=>`${v}/5`},
            {l:"Corpo",v:f.corpo||0,max:5,fmt:v=>`${v}/5`},
            {l:"Carga semanal",v:Math.max(0,5-f.carga),max:5,fmt:()=>`${f.carga} treinos`},
            {l:"Recuperação",v:Math.max(0,5-(f.consec||0)),max:5,fmt:()=>f.consec===0?"Descansado":f.consec===1?"1 dia consecutivo":`${f.consec} dias seguidos`},
            {l:"Proteína",v:f.protTarget>0?Math.min(5,(f.prot/f.protTarget)*5):3,max:5,fmt:()=>f.prot>0?`${f.prot}g / ${f.protTarget}g`:"Sem dados"},
          ].map(({l,v,max,fmt})=>(<div key={l} style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:T.muted,minWidth:100,textAlign:"right"}}>{l}</span>
            <div style={{flex:1,height:5,background:T.inpBg,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(100,(v/max)*100)}%`,background:color,borderRadius:3,transition:"width 0.5s ease"}}/></div>
            <span style={{fontSize:10,color:T.sub,minWidth:90}}>{fmt(v)}</span>
          </div>))}
        </div>
      </div>);
    })()}

    {/* ── Padrões de Alto Desempenho ─────────────────── */}
    {data.padroes?.length>0&&(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:10,textTransform:"uppercase"}}>Padrões de Alto Desempenho</div>
      <div style={{fontSize:12,color:T.sub,marginBottom:12,lineHeight:1.5}}>Baseado nos seus dados acumulados:</div>
      {data.padroes.map((p,i,arr)=>(<div key={i} style={{padding:"10px 12px",background:T.inpBg,borderRadius:10,marginBottom:i<arr.length-1?6:0}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{fontSize:18,flexShrink:0}}>{p.icon}</span>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:T.text}}>{p.val}</div>
            <div style={{fontSize:11,color:user.accent,marginTop:2}}>quando: {p.cond}</div>
            {p.vs&&<div style={{fontSize:11,color:T.muted,marginTop:1}}>{p.vs}</div>}
          </div>
        </div>
      </div>))}
    </div>)}

    {/* Insights */}
    {insights.length>0&&(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:10,textTransform:"uppercase"}}>Insights da Semana</div>
      {insights.map((ins,i)=>(<div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:i<insights.length-1?`1px solid ${T.border}`:"none",alignItems:"flex-start"}}>
        <span style={{fontSize:16,flexShrink:0}}>{ins.icon}</span>
        <span style={{fontSize:13,color:T.sub,lineHeight:1.5}}>{ins.text}</span>
      </div>))}
    </div>)}

    {/* Fadiga */}
    {data.avgFadiga&&(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Fadiga Média da Semana</div>
        <div style={{fontSize:12,color:T.sub}}>{data.avgFadiga<=4?"Alta fadiga — considere descanso":data.avgFadiga<=7?"Moderada — atenção ao sono":"Boa prontidão"}</div></div>
        <div style={{display:"flex",alignItems:"baseline",gap:3}}><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,color:data.avgFadiga<=4?"#EF4444":data.avgFadiga<=7?"#F59E0B":T.done}}>{data.avgFadiga}</span><span style={{fontSize:13,color:T.muted}}>/10</span></div>
      </div>
    </div>)}

    {/* ── Sem data de competição: prompt para configurar ── */}
    {!((window.__config?.goalDate)||data.goalDate)&&(
      <button onClick={()=>setShowSettings(true)} style={{width:"100%",display:"flex",alignItems:"center",gap:12,background:T.card,border:`1px dashed ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12,cursor:"pointer",textAlign:"left"}}>
        <span style={{fontSize:24}}>🏆</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text}}>Configure sua próxima competição</div>
          <div style={{fontSize:12,color:T.muted,marginTop:2}}>Defina a data para ativar o protocolo de preparação e o índice de prontidão completo</div>
        </div>
        <span style={{fontSize:18,color:T.muted}}>›</span>
      </button>
    )}

    {/* ── Protocolo de Competição ──────────────────── */}
    {(()=>{
      const gd=(window.__config?.goalDate)||data.goalDate;
      if(!gd)return null;
      const dl=Math.max(0,Math.ceil((new Date(gd)-new Date())/864e5));
      if(dl>90)return null;
      const gw=(window.__config?.goalWeight)||data.goalWeight;
      const phaseCfg=dl<=3?{label:"COMPETIÇÃO",color:"#EF4444",tip:"Acorda cedo, café leve, aquecimento progressivo. Mente no processo."}:dl<=7?{label:"RETA FINAL",color:"#F97316",tip:"Treinos levíssimos. Hidratação máxima. Nada de novo."}:dl<=14?{label:"SEMANA DECISIVA",color:"#F59E0B",tip:"Reduza o volume pela metade. Priorize sono e técnica."}:dl<=30?{label:"AFINAMENTO",color:user.accent,tip:"Mantenha intensidade, reduza volume. Revise adversários."}:{label:"PREPARAÇÃO",color:T.done,tip:"Fase normal — foco em técnica e condicional."};
      return(<div style={{background:T.card,border:`2px solid ${phaseCfg.color}30`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div><div style={{fontSize:10,fontWeight:700,color:phaseCfg.color,letterSpacing:1.2,marginBottom:3,textTransform:"uppercase"}}>Protocolo de Competição</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:T.text,letterSpacing:-0.3}}>{phaseCfg.label}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,color:phaseCfg.color,lineHeight:1}}>{dl}</div><div style={{fontSize:10,color:T.muted}}>dias</div></div>
        </div>
        <div style={{fontSize:13,color:T.sub,lineHeight:1.6,marginBottom:10}}>{phaseCfg.tip}</div>
        {gw&&data.pesoAtual&&(()=>{const diff=data.pesoAtual-gw;return diff>0&&(<div style={{background:`${phaseCfg.color}12`,borderRadius:8,padding:"8px 10px",fontSize:12,color:phaseCfg.color,fontWeight:600}}>⚖ Corte necessário: {diff.toFixed(1)}kg — {diff<=2?"dentro do possível na semana":"planeje com antecedência"}</div>);})()}
        {dl<=14&&<div style={{marginTop:10}}>
          <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Checklist</div>
          {[dl<=14&&"Revisar adversários cadastrados",dl<=7&&"Parar treinos de força pesados",dl<=7&&"Sono mínimo 8h",dl<=3&&"Refeição familiar na véspera",dl<=3&&"Kimono, faixa e documentos prontos"].filter(Boolean).map((item,i)=>(<div key={i} style={{display:"flex",gap:8,padding:"5px 0",fontSize:12,color:T.sub}}><span style={{color:phaseCfg.color}}>□</span>{item}</div>))}
        </div>}
      </div>);
    })()}

    {/* ── Correlações ───────────────────────────────── */}
    {(()=>{
      if(!data.correlacoes||data.correlacoes.length===0)return null;
      return(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px"}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:10,textTransform:"uppercase"}}>Correlações Detectadas</div>
        {data.correlacoes.map((c,i,arr)=>(<div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none",alignItems:"flex-start"}}>
          <span style={{fontSize:18,flexShrink:0}}>{c.icon}</span>
          <div><div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:2}}>{c.title}</div><div style={{fontSize:12,color:T.sub,lineHeight:1.5}}>{c.desc}</div></div>
        </div>))}
      </div>);
    })()}

    {/* ── Resumo Mensal ──────────────────────────────── */}
    {data.monthSummary&&(()=>{
      const m=data.monthSummary;
      return(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginTop:12}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:3,textTransform:"uppercase"}}>Resumo do Mês</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:T.text,marginBottom:12,textTransform:"capitalize"}}>{m.monthName}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:user.accent}}>{m.mTreinos}</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>treinos de força</div>
          </div>
          <div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:"#EF4444"}}>{m.mJiuCount}</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>sessões de Jiu</div>
          </div>
          {m.mWinRate!=null&&<div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:m.mWinRate>=50?T.done:"#F97316"}}>{m.mWinRate}%</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>aproveitamento ({m.mRolasCount} rolas)</div>
          </div>}
          {m.pesoDelta!=null&&<div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:m.pesoDelta<=0?T.done:"#EF4444"}}>{m.pesoDelta>0?"+":""}{m.pesoDelta}kg</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>variação de peso</div>
          </div>}
        </div>
        {m.mNutriDays>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${T.border}`,fontSize:12}}>
          <span style={{color:T.sub}}>Nutrição em dia</span>
          <span style={{fontWeight:700,color:T.text}}>{m.mNutriOk}/{m.mNutriDays} dias registrados</span>
        </div>}
        {m.bestWeekNum&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${T.border}`,fontSize:12}}>
          <span style={{color:T.sub}}>Semana mais ativa</span>
          <span style={{fontWeight:700,color:user.accent}}>Semana {m.bestWeekNum} · {m.bestWeekCount} treinos</span>
        </div>}
      </div>);
    })()}

    {/* ── Visão de Longo Prazo ────────────────────────── */}
    <LongTermStats treinoDates={data.allTreinoDates||[]} jiuMeta={data.allJiuMeta||[]} earliestDate={data.earliestDate} accent={user.accent}/>


  </div>);
}


/* ─── TOAST ─────────────────────────────────────────────────────────── */
function Toast({msg}){
  if(!msg)return null;
  return(
    <div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",
      background:"#0A0A0A",color:"#FFF",padding:"10px 20px",borderRadius:12,
      fontSize:13,fontWeight:600,zIndex:600,display:"flex",alignItems:"center",gap:8,
      boxShadow:"0 4px 24px rgba(0,0,0,0.35)",pointerEvents:"none",whiteSpace:"nowrap"}}>
      <span style={{color:"#4ADE80",fontSize:15}}>✓</span>{msg}
    </div>
  );
}

/* ─── PILLAR NAV ────────────────────────────────────────────────────── */
function PillarNav({pillar,setPillar,user}){
  const items=[{id:"home",l:"Home",i:"📊"},{id:"fisico",l:"Físico",i:"🏋️"},{id:"nutricao",l:"Nutrição",i:"🥗"},{id:"jiu",l:"Jiu",i:"🥋"}];
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:500,background:T.card,borderTop:`1px solid ${T.border}`,zIndex:100,paddingBottom:16}}>
      <div style={{display:"flex"}}>
        {items.map(n=>(<button key={n.id} onClick={()=>setPillar(n.id)} style={{flex:1,padding:"10px 4px 6px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,minHeight:56}}>
          <span style={{fontSize:24,opacity:pillar===n.id?1:0.4,transition:"opacity 0.15s"}}>{n.i}</span>
          <span style={{fontSize:11,color:pillar===n.id?user.accent:T.muted,fontWeight:pillar===n.id?700:400,transition:"color 0.15s"}}>{n.l}</span>
        </button>))}
      </div>
    </div>
  );
}

function BottomNav({tab,setTab,user}){
  const accent=user.accent;
  const nav=[
    {id:"plano",l:"Plano",i:"≡"},
    {id:"treinar",l:"Treinar",i:"▶"},
    {id:"stats",l:"Stats",i:"◈"},
    {id:"corpo",l:"Corpo",i:"◎"},
    {id:"extras",l:user.id==="G"?"Jiu":"Mais",i:user.id==="G"?"🥋":"✦"},
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:500,background:T.card,borderTop:`1px solid ${T.border}`,zIndex:100,paddingBottom:16}}>
      <div style={{display:"flex"}}>{nav.map(n=>(<button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:"10px 4px 6px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,minHeight:54}}><span style={{fontSize:18,color:tab===n.id?accent:T.muted,transition:"color 0.15s"}}>{n.i}</span><span style={{fontSize:10,color:tab===n.id?accent:T.muted,fontWeight:tab===n.id?700:400,transition:"color 0.15s"}}>{n.l}</span></button>))}</div>
    </div>
  );
}

function UserGate({onSelect,dark,toggleTheme}){
  const t=dark?DARK_T:LIGHT_T;
  return(
    <div style={{minHeight:"100vh",background:t.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{height:100%}
        body{background:${t.bg};font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
        @media(hover:none){button:active{opacity:0.75}}
      `}</style>
      <button onClick={toggleTheme} style={{position:"absolute",top:20,right:20,width:38,height:38,borderRadius:10,border:`1px solid ${t.border}`,background:t.inpBg,color:t.sub,fontSize:16,cursor:"pointer"}}>{dark?"☀️":"🌙"}</button>
      <div style={{fontSize:20,fontWeight:700,color:t.text,marginBottom:6,letterSpacing:1}}>JiuLab</div>
      <div style={{fontSize:14,color:t.muted,marginBottom:24,fontWeight:600,textAlign:"center"}}>Quem está usando o app agora?</div>
      <div style={{display:"flex",flexDirection:"column",gap:14,width:"100%",maxWidth:340}}>
        {Object.values(USERS).map(u=>(<button key={u.id} onClick={()=>onSelect(u.id)} style={{width:"100%",padding:"20px 18px",borderRadius:16,border:`2px solid ${u.accent}`,background:`${u.accent}12`,cursor:"pointer",display:"flex",alignItems:"center",gap:14,minHeight:76}}>
          <div style={{width:44,height:44,borderRadius:"50%",background:u.accent,color:"#FFF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,flexShrink:0}}>{u.name[0]}</div>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:17,fontWeight:700,color:t.text}}>{u.name}</div>
            <div style={{fontSize:11,color:t.muted,marginTop:2}}>Toque para entrar</div>
          </div>
        </button>))}
      </div>
      <div style={{fontSize:10,color:t.muted,marginTop:24,textAlign:"center",maxWidth:300,lineHeight:1.5}}>Essa tela aparece toda vez que o app abre, pra garantir que cada um edite só a própria sessão.</div>
    </div>
  );
}
