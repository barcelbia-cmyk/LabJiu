function BJJTimer({user}){
  const cfg=()=>window.__config||DEF_CFG[user.id];
  const[roundMin,setRoundMin]=useState(()=>cfg().roundMin||5);
  const[restMin,setRestMin]=useState(()=>cfg().restMin||1);
  const[numRounds,setNumRounds]=useState(()=>cfg().numRounds||6);
  const[phase,setPhase]=useState("idle");// idle|work|rest|done
  const[round,setRound]=useState(1);
  const[endTime,setEndTime]=useState(null);
  const[display,setDisplay]=useState("00:00");
  const[elapsed,setElapsed]=useState(0);// for progress bar
  const[totalSec,setTotalSec]=useState(0);
  useWakeLock(phase==="work"||phase==="rest");
  useEffect(()=>{
    if(phase==="idle"||phase==="done"){setDisplay(phase==="done"?"FEITO!":fmtTime(roundMin*60));return;}
    const iv=setInterval(()=>{
      const rem=Math.max(0,Math.ceil((endTime-Date.now())/1000));
      setDisplay(fmtTime(rem));setElapsed(Date.now());
      if(rem<=0){
        if(phase==="work"){
          if(round>=numRounds){clearInterval(iv);setPhase("done");vib([300,100,300,100,500]);playBeep();}
          else{setPhase("rest");setEndTime(Date.now()+restMin*60000);setTotalSec(restMin*60);vib([100,80,100]);playBeep();}
        } else if(phase==="rest"){
          setRound(r=>r+1);setPhase("work");setEndTime(Date.now()+roundMin*60000);setTotalSec(roundMin*60);vib([200,80,200]);playBeep();
        }
      }
    },250);
    return()=>clearInterval(iv);
  },[phase,endTime,round,numRounds,roundMin,restMin]);
  const startTimer=()=>{setRound(1);setPhase("work");const s=roundMin*60000;setEndTime(Date.now()+s);setTotalSec(roundMin*60);};
  const reset=()=>{setPhase("idle");setRound(1);setDisplay(fmtTime(roundMin*60));};
  const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const remSec=endTime?Math.max(0,Math.ceil((endTime-Date.now())/1000)):0;
  const pct=totalSec>0?Math.min(100,Math.round(((totalSec-remSec)/totalSec)*100)):0;
  const isWork=phase==="work";const isRest=phase==="rest";
  const phaseColor=isWork?user.accent:isRest?"#06B6D4":T.muted;
  return(
    <div>
      {phase==="idle"&&(<>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px",marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:12,textTransform:"uppercase"}}>Configuração</div>
          {[["Duração do round",roundMin,setRoundMin,"min","roundMin"],["Descanso entre rounds",restMin,setRestMin,"min","restMin"],["Número de rounds",numRounds,setNumRounds,"rounds","numRounds"]].map(([l,val,set,u,k])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:13,color:T.sub}}>{l}</span>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button onClick={()=>set(v=>Math.max(1,v-1))} style={{width:36,height:36,borderRadius:9,border:`1px solid ${T.border}`,background:T.inpBg,color:T.text,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:user.accent,minWidth:40,textAlign:"center"}}>{val}{u==="min"?"'":""}</span>
                <button onClick={()=>set(v=>v+1)} style={{width:36,height:36,borderRadius:9,border:`1px solid ${T.border}`,background:T.inpBg,color:T.text,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
              </div>
            </div>
          ))}
          <div style={{marginTop:4,fontSize:11,color:T.muted,textAlign:"center"}}>Treino total: {Math.round(numRounds*roundMin+(numRounds-1)*restMin)}min</div>
        </div>
        <button onClick={startTimer} style={{width:"100%",padding:18,borderRadius:14,border:"none",background:user.accent,color:"#FFF",fontSize:20,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>INICIAR TREINO</button>
      </>)}
      {(phase==="work"||phase==="rest")&&(<>
        <div style={{background:T.card,border:`2px solid ${phaseColor}40`,borderRadius:18,padding:"28px 20px",marginBottom:16,textAlign:"center"}}>
          <div style={{fontSize:11,fontWeight:700,color:phaseColor,letterSpacing:2.5,marginBottom:8,textTransform:"uppercase"}}>{isWork?"ROUND":"DESCANSO"}</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:72,fontWeight:700,color:phaseColor,lineHeight:1,letterSpacing:-2,marginBottom:12}}>{display}</div>
          <div style={{height:8,background:T.inpBg,borderRadius:4,marginBottom:16,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:phaseColor,borderRadius:4,transition:"width 0.25s linear"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:8}}>
            {Array.from({length:numRounds},(_, i)=>(<div key={i} style={{width:10,height:10,borderRadius:"50%",background:i<round-1?T.done:i===round-1?phaseColor:T.border,transition:"background 0.3s"}}/>))}
          </div>
          <div style={{fontSize:13,color:T.muted,marginTop:10}}>Round {round} de {numRounds}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={reset} style={{flex:1,padding:14,borderRadius:12,border:`1px solid ${T.border}`,background:T.inpBg,color:T.sub,fontSize:14,cursor:"pointer"}}>Encerrar</button>
          {isWork&&round>1&&<button onClick={()=>{setRound(r=>r-1);setPhase("rest");setEndTime(Date.now()+restMin*60000);setTotalSec(restMin*60);}} style={{flex:1,padding:14,borderRadius:12,border:`1px solid ${T.border}`,background:T.inpBg,color:T.sub,fontSize:14,cursor:"pointer"}}>← Round ant.</button>}
        </div>
      </>)}
      {phase==="done"&&(<>
        <div style={{background:T.doneBg,border:`2px solid ${T.borderDone}`,borderRadius:18,padding:"40px 20px",textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:48,marginBottom:12}}>🥋</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:700,color:T.done,marginBottom:6}}>TREINO CONCLUÍDO</div>
          <div style={{fontSize:14,color:T.sub}}>{numRounds} rounds · {roundMin}min cada</div>
          <div style={{fontSize:14,color:T.sub,marginTop:4}}>Total: {Math.round(numRounds*roundMin+(numRounds-1)*restMin)}min</div>
        </div>
        <button onClick={reset} style={{width:"100%",padding:16,borderRadius:12,border:"none",background:user.accent,color:"#FFF",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif"}}>NOVO TREINO</button>
      </>)}
    </div>
  );
}

/* ─── JIU / EXTRAS VIEW ─────────────────────────────────────────────── */
function JiuView({user}){
  const[tab,setTab]=useState("sessao");
  const[jiuSessions,setJiuSessions]=useState([]);
  const[tecnico,setTecnico]=useState([]);
  const[adversarios,setAdversarios]=useState([]);
  const[faixas,setFaixas]=useState([]);
  const[faixaInp,setFaixaInp]=useState({faixa:"Branca",grau:0,data:"",notas:""});
  const[parceiros,setParceiros]=useState([]);
  const[parcSearch,setParcSearch]=useState("");
  const[editingParcId,setEditingParcId]=useState(null);
  const[openParcId,setOpenParcId]=useState(null);
  const[parcNotaDraft,setParcNotaDraft]=useState("");

  // Active session draft (form state)

  const[sessDur,setSessDur]=useState("");
  const[editingSessionId,setEditingSessionId]=useState(null);
  const[posicaoEnsinada,setPosicaoEnsinada]=useState("");
  const[detalhesPosicaoEnsinada,setDetalhesPosicaoEnsinada]=useState("");
  const[draftRolas,setDraftRolas]=useState([]);
  const[posOk,setPosOk]=useState("");
  const[posNok,setPosNok]=useState("");
  const[sessNotas,setSessNotas]=useState("");

  // Rola entry sub-form
  const[showRolaForm,setShowRolaForm]=useState(false);
  const[rolaInp,setRolaInp]=useState({parceiroId:null,parceiro:"",peso:"",nivel:"",intensidade:"Técnico",eventos:[],notas:""});

  const[tecInp,setTecInp]=useState({posicao:"Meia-guarda",titulo:"",detalhe:""});
  const[tecSearch,setTecSearch]=useState("");
  const[advInp,setAdvInp]=useState({nome:"",clube:"",peso:"",estilo:"",forte:"",fraco:""});
  const[compInp,setCompInp]=useState({evento:"",cat:"",peso:"",resultado:"",notas:""});
  const[comps,setComps]=useState([]);
  const[cardioLog,setCardioLog]=useState([]);
  const[cardInp,setCardInp]=useState({dur:"",zona:"2",rpe:"",hora:"Manhã"});

  // ── Load + auto-migrate legacy data ──────────────────────────────
  useEffect(()=>{
    (async()=>{
      let sessions=await sGet(sk(user.id,"jiu_sessions"),null);
      if(sessions===null){
        // Migrate from old separate "jiu" (sessions) + "rolas" (flat list) keys
        const oldJiu=await sGet(sk(user.id,"jiu"),[]);
        const oldRolas=await sGet(sk(user.id,"rolas"),[]);
        const usedRolaIdx=new Set();
        sessions=oldJiu.map((s,i)=>{
          const matched=oldRolas.filter((r,ri)=>{if(r.date===s.date&&!usedRolaIdx.has(ri)){usedRolaIdx.add(ri);return true;}return false;});
          return{id:`mig_${i}_${Date.now()}`,date:s.date,tipo:s.tipo||"Técnico",dur:s.dur||"",fadiga:s.fadiga||null,rolas:matched,pos_ok:s.pos_ok||"",pos_nok:s.pos_nok||"",notas:s.notas||""};
        });
        const leftover=oldRolas.filter((r,ri)=>!usedRolaIdx.has(ri));
        if(leftover.length){
          const byDate={};leftover.forEach(r=>{(byDate[r.date]=byDate[r.date]||[]).push(r);});
          Object.entries(byDate).forEach(([date,rs])=>{sessions.push({id:`mig_leftover_${date}`,date,tipo:"Técnico",dur:"",fadiga:null,rolas:rs,pos_ok:"",pos_nok:"",notas:"Rolas migrados automaticamente"});});
        }
        sessions.sort((a,b)=>b.date.localeCompare(a.date));
        if(sessions.length)await sSet(sk(user.id,"jiu_sessions"),sessions);
      }
      setJiuSessions(sessions||[]);
    })();
    sGet(sk(user.id,"tecnico"),[]).then(d=>setTecnico(d));
    sGet(sk(user.id,"adversarios"),[]).then(d=>setAdversarios(d));
    sGet(sk(user.id,"faixas"),[]).then(d=>setFaixas(d));
    sGet(sk(user.id,"parceiros"),[]).then(d=>setParceiros(d));
    sGet(sk(user.id,"comps"),[]).then(d=>setComps(d));
    sGet(sk(user.id,"cardio"),[]).then(d=>setCardioLog(d));
  },[user.id]);

  // ── Derived: flat list of all rolas across all sessions (for analysis) ──
  const allRolas=jiuSessions.flatMap(s=>(s.rolas||[]).map(r=>({...r,date:s.date})));

  const isPos=r=>r.resultados?Object.keys(r.resultados).some(k=>["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"].includes(k)):["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"].includes(r.resultado);
  const isNeg=r=>r.resultados?Object.keys(r.resultados).some(k=>["Fui finalizado","Fui raspado","Fui passado","Sofri pegada nas costas","Fui montado"].includes(k)):["Fui finalizado","Fui raspado","Fui passado","Sofri pegada nas costas","Fui montado"].includes(r.resultado);
  const countR=(r,list)=>r.resultados?Object.entries(r.resultados).filter(([k])=>list.includes(k)).reduce((a,[,v])=>a+v,0):(list.includes(r.resultado)?1:0);
  const getPos=(r)=>r.posicoes&&r.posicoes.length?r.posicoes:(r.posicao?[r.posicao]:[]);

  // ── Foco sugerido: posição mais fraca via rolas + temas recentes ──
  const topIssues=Object.entries(jiuSessions.slice(0,5).reduce((acc,s)=>{
    (s.pos_nok||"").split(/[,;]+/).map(p=>p.trim()).filter(Boolean).forEach(p=>{acc[p]=(acc[p]||0)+1;});
    return acc;
  },{})).filter(([,v])=>v>=2).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);

  const weakestPos=(()=>{
    const POSITIVOS3=["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"];const NEGATIVOS3=["Fui finalizado","Fui raspado","Fui passado","Sofri pegada nas costas","Fui montado"];
    const byPos3={};allRolas.forEach(r=>{getPos(r).forEach(pos=>{if(!byPos3[pos])byPos3[pos]=[];byPos3[pos].push(r);});});
    const stats=Object.entries(byPos3).filter(([,a])=>a.length>=3).map(([pos,arr])=>{const w=arr.reduce((a,r)=>a+countR(r,POSITIVOS3),0);const l=arr.reduce((a,r)=>a+countR(r,NEGATIVOS3),0);const score=(w+l)>0?(w/(w+l))*10:5;return{pos,score,n:arr.length};});
    if(!stats.length)return null;
    return stats.sort((a,b)=>a.score-b.score)[0];
  })();

  // ── Save handlers ────────────────────────────────────────────────
  const addDraftRola=async()=>{
    if(!rolaInp.parceiro)return;
    let pId=rolaInp.parceiroId;
    if(!pId){
      const p=await findOrCreateParceiro(rolaInp.parceiro,rolaInp.nivel);
      pId=p.id;
    }
    const eventos=rolaInp.eventos||[];
    // Agrega eventos (rounds, cada um com uma sequência ordenada de passos) em campos legados para manter stats/histórico funcionando
    const resultados={};const posicoesSet=new Set();const finalizacaoFeita=[];const finalizacaoSofrida=[];
    eventos.forEach(rnd=>{
      if(rnd.guardaInicial)posicoesSet.add(rnd.guardaInicial);
      (rnd.sequencia||[]).forEach(s=>{
        if(s.tipo==="Neutro")return;
        resultados[s.tipo]=(resultados[s.tipo]||0)+1;
        const tec=(s.tecnica||[]).map(t=>t==="Outra"?(s.tecnicaOutra||"Outra"):t);
        if(s.tipo==="Raspei"||s.tipo==="Fui raspado"||s.tipo==="Passei"||s.tipo==="Fui passado"){tec.forEach(t=>posicoesSet.add(t));}
        if(s.tipo==="Finalizei")finalizacaoFeita.push(...tec);
        if(s.tipo==="Fui finalizado")finalizacaoSofrida.push(...tec);
        if(s.tipo==="Cheguei nas costas"||s.tipo==="Sofri pegada nas costas")posicoesSet.add("Costas");
        if(s.tipo==="Montei"||s.tipo==="Fui montado")posicoesSet.add("Montada");
      });
    });
    const novaRola={...rolaInp,parceiroId:pId,id:Date.now(),eventos,resultados,posicoes:[...posicoesSet],finalizacaoFeita,finalizacaoSofrida};
    setDraftRolas(p=>[...p,novaRola]);
    setRolaInp({parceiroId:null,parceiro:"",peso:"",nivel:"",intensidade:"Técnico",eventos:[],notas:""});
    setShowRolaForm(false);
    window.__toast?.("Rola adicionado à sessão");
  };
  const removeDraftRola=(id)=>setDraftRolas(p=>p.filter(r=>r.id!==id));

  const saveSession=async()=>{
    if(!sessDur&&draftRolas.length===0){window.__toast?.("Adicione duração ou pelo menos um rola");return;}
    if(editingSessionId){
      const nl=jiuSessions.map(s=>s.id===editingSessionId?{...s,dur:sessDur,posicaoEnsinada,detalhesPosicaoEnsinada,rolas:draftRolas,pos_ok:posOk,pos_nok:posNok,notas:sessNotas}:s);
      setJiuSessions(nl);await sSet(sk(user.id,"jiu_sessions"),nl);
      window.__toast?.("Sessão atualizada");
      setEditingSessionId(null);
    }else{
      const newSession={id:Date.now(),date:todayStr(),dur:sessDur,posicaoEnsinada,detalhesPosicaoEnsinada,rolas:draftRolas,pos_ok:posOk,pos_nok:posNok,notas:sessNotas};
      const nl=[newSession,...jiuSessions].slice(0,300);
      setJiuSessions(nl);await sSet(sk(user.id,"jiu_sessions"),nl);
      window.__toast?.("Sessão salva");
    }
    setSessDur("");setPosicaoEnsinada("");setDetalhesPosicaoEnsinada("");setDraftRolas([]);setPosOk("");setPosNok("");setSessNotas("");
  };

  const editSession=(s)=>{
    setEditingSessionId(s.id);
    setSessDur(s.dur||"");setPosicaoEnsinada(s.posicaoEnsinada||"");setDetalhesPosicaoEnsinada(s.detalhesPosicaoEnsinada||"");
    setDraftRolas(s.rolas||[]);setPosOk(s.pos_ok||"");setPosNok(s.pos_nok||"");setSessNotas(s.notas||"");
    window.__toast?.("Editando sessão — role para cima");
  };
  const cancelEditSession=()=>{
    setEditingSessionId(null);
    setSessDur("");setPosicaoEnsinada("");setDetalhesPosicaoEnsinada("");setDraftRolas([]);setPosOk("");setPosNok("");setSessNotas("");
  };

  const deleteSession=async(id)=>{
    const nl=jiuSessions.filter(s=>s.id!==id);
    setJiuSessions(nl);await sSet(sk(user.id,"jiu_sessions"),nl);
    if(editingSessionId===id)cancelEditSession();
  };

  const saveTec=async()=>{
    if(!tecInp.titulo)return;
    const nl=[{id:Date.now(),date:todayStr(),...tecInp},...tecnico].slice(0,500);
    setTecnico(nl);await sSet(sk(user.id,"tecnico"),nl);window.__toast?.("Detalhe técnico salvo");

      Object.entries(pm).filter(([,v])=>v.t>=2).sort((a,b)=>b[1].t-a[1].t).forEach(([pos,v])=>lines.push(`  ${pos}: ${Math.round((v.w/v.t)*100)}% (${v.t} rolas)`));

        const parcStats=filtParc.map(p=>{
          const arr=(byParceiro[p.id]||byParceiro[p.nome]||[]).sort((a,b)=>a.date.localeCompare(b.date));
          const wins=arr.reduce((a,r)=>a+countR(r,POSITIVOS5),0);
          const losses=arr.reduce((a,r)=>a+countR(r,NEGATIVOS5),0);
          const total=wins+losses;
          const score=total>0?Math.round((wins/total)*10*10)/10:null;
          let trend=null;
          if(arr.length>=4){
            const mid=Math.floor(arr.length/2);
            const older=arr.slice(0,mid);const recent=arr.slice(mid);
            const oW=older.reduce((a,r)=>a+countR(r,POSITIVOS5),0);const oL=older.reduce((a,r)=>a+countR(r,NEGATIVOS5),0);
            const rW=recent.reduce((a,r)=>a+countR(r,POSITIVOS5),0);const rL=recent.reduce((a,r)=>a+countR(r,NEGATIVOS5),0);
            const oScore=(oW+oL)>0?(oW/(oW+oL))*10:5;
            const rScore=(rW+rL)>0?(rW/(rW+rL))*10:5;
            trend=Math.round((rScore-oScore)*10)/10;
          }
          return{...p,rolaCount:arr.length,score,trend,wins,losses,arr};
        }).sort((a,b)=>{
          if(a.score==null&&b.score==null)return b.rolaCount-a.rolaCount;
          if(a.score==null)return 1;
          if(b.score==null)return -1;
          return a.score-b.score;
        });

        const buildDetail=(p)=>{
          const arr=p.arr;
          const getPosArr=(r)=>r.posicoes&&r.posicoes.length?r.posicoes:(r.posicao?[r.posicao]:[]);
          // breakdown por posição
          const byPos={};
          arr.forEach(r=>{getPosArr(r).forEach(pos=>{if(!byPos[pos])byPos[pos]={w:0,l:0};byPos[pos].w+=countR(r,POSITIVOS5);byPos[pos].l+=countR(r,NEGATIVOS5);});});
          const posBreakdown=Object.entries(byPos).map(([pos,{w,l}])=>({pos,w,l,total:w+l,pct:(w+l)>0?Math.round((w/(w+l))*100):null})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
          // finalizações feitas / sofridas
          const finFeitas={};arr.forEach(r=>(r.finalizacaoFeita||[]).forEach(f=>finFeitas[f]=(finFeitas[f]||0)+1));
          const finSofridas={};arr.forEach(r=>(r.finalizacaoSofrida||[]).forEach(f=>finSofridas[f]=(finSofridas[f]||0)+1));
          const finFeitasArr=Object.entries(finFeitas).sort((a,b)=>b[1]-a[1]);
          const finSofridasArr=Object.entries(finSofridas).sort((a,b)=>b[1]-a[1]);
          // texto auto-gerado
          let insight="";
          if(arr.length<3){
            insight="Registre mais rolas contra esse parceiro para o app começar a identificar padrões.";
          }else{
            const parts=[];
            const bestPos=posBreakdown.filter(x=>x.total>=2).sort((a,b)=>b.pct-a.pct)[0];
            const worstPos=posBreakdown.filter(x=>x.total>=2).sort((a,b)=>a.pct-b.pct)[0];
            if(bestPos&&bestPos.pct>=60)parts.push(`Você vai bem em ${bestPos.pos} contra ${p.nome} (${bestPos.pct}% de aproveitamento).`);
            if(worstPos&&worstPos.pct<=40&&worstPos.pos!==bestPos?.pos)parts.push(`Cuidado em ${worstPos.pos} — só ${worstPos.pct}% de aproveitamento aí.`);
            if(finSofridasArr.length>0)parts.push(`${p.nome} costuma te finalizar com ${finSofridasArr[0][0]}${finSofridasArr[0][1]>1?` (${finSofridasArr[0][1]}x)`:""}.`);
            if(finFeitasArr.length>0)parts.push(`Sua finalização mais efetiva contra ${p.nome} é ${finFeitasArr[0][0]}${finFeitasArr[0][1]>1?` (${finFeitasArr[0][1]}x)`:""}.`);
            insight=parts.length?parts.join(" "):`${p.wins} positivos e ${p.losses} negativos registrados até agora — sem padrão claro de posição ainda.`;
          }
          return{posBreakdown,finFeitasArr,finSofridasArr,insight};
        };

        return(<>
          <input value={parcSearch} onChange={e=>setParcSearch(e.target.value)} placeholder="🔍 Buscar parceiro..." style={{...I,marginBottom:12}}/>
          {parcStats.length>0&&<div style={{fontSize:11,color:T.muted,marginBottom:10}}>Ordenado de quem você mais perde para quem você mais ganha.</div>}
          {parcStats.length===0&&<div style={{fontSize:13,color:T.muted,fontStyle:"italic",padding:"10px 0"}}>Parceiros aparecem aqui automaticamente quando você registra rolas com o nome deles.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {parcStats.map((p,idx)=>{
              const isOpen=openParcId===p.id;
              const detail=isOpen?buildDetail(p):null;
              const rank=idx+1;
              const rankColor=p.score==null?T.muted:p.score<5?"#EF4444":p.score<7?"#F59E0B":T.done;
              return(<Box key={p.id} mb={0}>
                <button onClick={()=>{if(isOpen){setOpenParcId(null);}else{setOpenParcId(p.id);setParcNotaDraft(p.notaEstrategia||"");}}} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,background:"transparent",border:"none",cursor:"pointer",padding:0,textAlign:"left"}}>
                  <div style={{display:"flex",gap:10,flex:1}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:`${rankColor}15`,border:`1px solid ${rankColor}40`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,color:rankColor}}>{rank}</span>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:15,fontWeight:700,color:T.text}}>{p.nome}</div>
                      <div style={{fontSize:11,color:T.muted,marginTop:1}}>{p.rolaCount} rolas registrados {isOpen?"▲":"▼"}</div>
                    </div>
                  </div>
                  {p.score!=null&&<div style={{textAlign:"right"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {p.trend!==null&&Math.abs(p.trend)>=0.3&&<span style={{fontSize:11,fontWeight:700,color:p.trend>0?T.done:"#EF4444"}}>{p.trend>0?"↑":"↓"}{Math.abs(p.trend).toFixed(1)}</span>}
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:p.score>=7?T.done:p.score>=5?user.accent:"#EF4444"}}>{p.score.toFixed(1)}/10</span>
                    </div>
                  </div>}
                </button>

                {editingParcId===p.id?(
                  <div style={{marginBottom:8}}>
                    <div style={{fontSize:10,color:T.muted,marginBottom:6,fontWeight:700,textTransform:"uppercase"}}>Atualizar faixa atual</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                      {["Branca","Azul","Roxa","Marrom","Preta"].map(f=>(<button key={f} onClick={()=>{updateParceiroFaixa(p.id,f);setEditingParcId(null);}} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:20,border:`1.5px solid ${p.faixaAtual===f?FAIXA_COLORS[f]:T.border}`,background:p.faixaAtual===f?`${FAIXA_COLORS[f]}15`:T.inpBg,cursor:"pointer"}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:FAIXA_COLORS[f]}}/>
                        <span style={{fontSize:11,color:T.text}}>{f}</span>
                      </button>))}
                    </div>
                    <button onClick={()=>setEditingParcId(null)} style={{fontSize:11,color:T.muted,background:"transparent",border:"none",cursor:"pointer"}}>Cancelar</button>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <button onClick={()=>setEditingParcId(p.id)} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"none",cursor:"pointer",padding:0}}>
                      <div style={{width:12,height:12,borderRadius:"50%",background:FAIXA_COLORS[p.faixaAtual]||"#888"}}/>
                      <span style={{fontSize:12,color:T.sub}}>{p.faixaAtual}</span>
                      <span style={{fontSize:10,color:user.accent}}>✎ editar</span>
                    </button>
                    <button onClick={()=>deleteParceiro(p.id)} style={{background:"transparent",border:"none",color:T.muted,fontSize:11,cursor:"pointer"}}>remover</button>
                  </div>
                )}
                {p.score!=null&&<div style={{height:6,background:T.inpBg,borderRadius:3,marginBottom:6}}>
                  <div style={{height:"100%",width:`${p.score*10}%`,background:p.score>=7?T.done:p.score>=5?user.accent:"#EF4444",borderRadius:3,transition:"width 0.4s ease"}}/>
                </div>}
                {p.score!=null&&<div style={{fontSize:10,color:T.muted}}>{p.wins} positivos · {p.losses} negativos</div>}

                {isOpen&&detail&&(<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.border}`}}>
                  {/* Auto insight */}
                  <div style={{background:`${user.accent}08`,border:`1px solid ${user.accent}25`,borderRadius:10,padding:"10px 12px",marginBottom:14}}>
                    <div style={{fontSize:9,fontWeight:700,color:user.accent,letterSpacing:0.6,marginBottom:5,textTransform:"uppercase"}}>🤖 Análise automática</div>
                    <div style={{fontSize:12,color:T.sub,lineHeight:1.55}}>{detail.insight}</div>
                  </div>

                  {/* Por posição */}
                  {detail.posBreakdown.length>0&&(<div style={{marginBottom:14}}>
                    <div style={{fontSize:9,fontWeight:700,color:T.muted,letterSpacing:0.6,marginBottom:8,textTransform:"uppercase"}}>Por posição</div>
                    {detail.posBreakdown.map(({pos,pct,total})=>(<div key={pos} style={{marginBottom:6}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                        <span style={{fontSize:12,color:T.text}}>{pos}</span>
                        <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:pct==null?T.muted:pct>=60?T.done:pct<=40?"#EF4444":user.accent,fontWeight:700}}>{pct==null?"—":`${pct}%`}<span style={{color:T.muted,fontWeight:400}}> ({total})</span></span>
                      </div>
                      {pct!=null&&<div style={{height:5,background:T.inpBg,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct>=60?T.done:pct<=40?"#EF4444":user.accent,borderRadius:3}}/></div>}
                    </div>))}
                  </div>)}

                  {/* Finalizações */}
                  {(detail.finFeitasArr.length>0||detail.finSofridasArr.length>0)&&(<div style={{display:"flex",gap:10,marginBottom:14}}>
                    {detail.finFeitasArr.length>0&&<div style={{flex:1}}>
                      <div style={{fontSize:9,fontWeight:700,color:T.done,letterSpacing:0.6,marginBottom:6,textTransform:"uppercase"}}>Você finaliza com</div>
                      {detail.finFeitasArr.map(([f,c])=>(<div key={f} style={{fontSize:11,color:T.sub,marginBottom:2}}>{f} <span style={{color:T.muted}}>×{c}</span></div>))}
                    </div>}
                    {detail.finSofridasArr.length>0&&<div style={{flex:1}}>
                      <div style={{fontSize:9,fontWeight:700,color:"#EF4444",letterSpacing:0.6,marginBottom:6,textTransform:"uppercase"}}>Ele(a) finaliza com</div>
                      {detail.finSofridasArr.map(([f,c])=>(<div key={f} style={{fontSize:11,color:T.sub,marginBottom:2}}>{f} <span style={{color:T.muted}}>×{c}</span></div>))}
                    </div>}
                  </div>)}

                  {/* Nota estratégica */}
                  <div style={{fontSize:9,fontWeight:700,color:T.muted,letterSpacing:0.6,marginBottom:6,textTransform:"uppercase"}}>Sua anotação</div>
                  <textarea value={parcNotaDraft} onChange={e=>setParcNotaDraft(e.target.value)} onBlur={()=>saveParceiroNota(p.id,parcNotaDraft)} placeholder="Como lidar com esse parceiro, estratégia, observações..." rows={2} style={{...I,resize:"none",fontSize:13}}/>
                </div>)}
              </Box>);
            })}
          </div>
        </>);
      })()}

      {/* ── TÉCNICO ────────────────────────────────────────────── */}
      {/* ── POSIÇÕES (fundida com Técnico) ──────────────────────── */}
      {tab==="posicoes"&&(()=>{
        const POSITIVOS=["Finalizei","Raspei","Passei","Cheguei nas costas","Montei"];
        const NEGATIVOS=["Fui finalizado","Fui raspado","Fui passado","Sofri pegada nas costas","Fui montado"];
        const getPos2=(r)=>r.posicoes&&r.posicoes.length?r.posicoes:(r.posicao?[r.posicao]:[]);
        const byPos={};
        allRolas.forEach(r=>{getPos2(r).forEach(pos=>{if(!byPos[pos])byPos[pos]=[];byPos[pos].push(r);});});
        const posStats=Object.entries(byPos).filter(([,arr])=>arr.length>=2).map(([pos,arr])=>{
          const sorted=[...arr].sort((a,b)=>a.date.localeCompare(b.date));
          const totalW=sorted.reduce((a,r)=>a+countR(r,POSITIVOS),0);
          const totalL=sorted.reduce((a,r)=>a+countR(r,NEGATIVOS),0);
          const totalEvents=totalW+totalL;
          const score=totalEvents>0?Math.round((totalW/totalEvents)*10*10)/10:5;
          let trend=null;
          if(sorted.length>=4){
            const mid=Math.floor(sorted.length/2);
            const older=sorted.slice(0,mid);const recent=sorted.slice(mid);
            const oW=older.reduce((a,r)=>a+countR(r,POSITIVOS),0);const oL=older.reduce((a,r)=>a+countR(r,NEGATIVOS),0);
            const rW=recent.reduce((a,r)=>a+countR(r,POSITIVOS),0);const rL=recent.reduce((a,r)=>a+countR(r,NEGATIVOS),0);
            const oScore=(oW+oL)>0?(oW/(oW+oL))*10:5;
            const rScore=(rW+rL)>0?(rW/(rW+rL))*10:5;
            trend=Math.round((rScore-oScore)*10)/10;
          }
          return{pos,score,trend,rolas:sorted.length,wins:totalW,losses:totalL};
        }).sort((a,b)=>b.rolas-a.rolas);

        // Dificuldades reportadas (texto livre em pos_nok)
        const difMap={};
        jiuSessions.forEach(s=>{
          (s.pos_nok||"").split(/[,;]+/).map(x=>x.trim()).filter(Boolean).forEach(txt=>{
            if(!difMap[txt])difMap[txt]={count:0,dates:[]};
            difMap[txt].count++;difMap[txt].dates.push(s.date);
          });
        });
        // Posições ensinadas pelo professor
        const ensinadas=jiuSessions.filter(s=>s.posicaoEnsinada).map(s=>({date:s.date,pos:s.posicaoEnsinada,det:s.detalhesPosicaoEnsinada}));

        const matchesPos=(txt,pos)=>txt.toLowerCase().includes(pos.toLowerCase())||pos.toLowerCase().includes(txt.toLowerCase());

        // Une todas as posições conhecidas: as com rolas + as com dificuldade/ensino/nota mas sem rolas suficientes
        const allKnownPos=new Set([...posStats.map(p=>p.pos)]);
        Object.keys(difMap).forEach(txt=>{POS.forEach(p=>{if(matchesPos(txt,p))allKnownPos.add(p);});});
        ensinadas.forEach(e=>allKnownPos.add(e.pos));
        tecnico.forEach(t=>allKnownPos.add(t.posicao));

        const cardsData=[...allKnownPos].map(pos=>{
          const stat=posStats.find(p=>p.pos===pos);
          const difs=Object.entries(difMap).filter(([txt])=>matchesPos(txt,pos));
          const ens=ensinadas.filter(e=>e.pos===pos);
          const notas=tecnico.filter(t=>t.posicao===pos);
          return{pos,stat,difs,ens,notas,relevance:(stat?.rolas||0)+difs.length+ens.length+notas.length};
        }).filter(c=>c.relevance>0||tecSearch).sort((a,b)=>b.relevance-a.relevance);

        const filtered=!tecSearch?cardsData:cardsData.filter(c=>
          c.pos.toLowerCase().includes(tecSearch.toLowerCase())||
          c.difs.some(([txt])=>txt.toLowerCase().includes(tecSearch.toLowerCase()))||
          c.ens.some(e=>e.det?.toLowerCase().includes(tecSearch.toLowerCase()))||
          c.notas.some(n=>[n.titulo,n.detalhe].some(x=>x?.toLowerCase().includes(tecSearch.toLowerCase())))
        );

        return(<>
          <input value={tecSearch} onChange={e=>setTecSearch(e.target.value)} placeholder="🔍 Buscar posição, palavra-chave..." style={{...I,marginBottom:12}}/>

          {filtered.length===0&&<div style={{fontSize:13,color:T.muted,fontStyle:"italic",padding:"20px 0",textAlign:"center"}}>
            Registre rolas, "o que não funcionou" e "posição ensinada" nas sessões — aqui aparece tudo organizado por posição.
          </div>}

          {filtered.map(({pos,stat,difs,ens,notas})=>(
            <Box key={pos} mb={10}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:stat?6:2}}>
                <span style={{fontSize:14,color:T.text,fontWeight:700}}>{pos}</span>
                {stat&&<div style={{display:"flex",alignItems:"center",gap:8}}>
                  {stat.trend!==null&&Math.abs(stat.trend)>=0.3&&<span style={{fontSize:11,fontWeight:700,color:stat.trend>0?T.done:"#EF4444"}}>{stat.trend>0?"↑":"↓"}{Math.abs(stat.trend).toFixed(1)}</span>}
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,color:stat.score>=7?T.done:stat.score>=5?user.accent:"#EF4444",fontWeight:700}}>{stat.score.toFixed(1)}/10</span>
                </div>}
              </div>
              {stat&&(<>
                <div style={{height:6,background:T.inpBg,borderRadius:3,overflow:"hidden",marginBottom:4}}>
                  <div style={{height:"100%",width:`${stat.score*10}%`,background:stat.score>=7?T.done:stat.score>=5?user.accent:"#EF4444",borderRadius:3}}/>
                </div>
                <div style={{fontSize:10,color:T.muted,marginBottom:8}}>{stat.rolas} rolas · {stat.wins} positivos · {stat.losses} negativos</div>
              </>)}
              {!stat&&<div style={{fontSize:11,color:T.muted,marginBottom:8}}>Sem rolas suficientes ainda para calcular score (mínimo 2)</div>}

              {difs.length>0&&(<div style={{marginBottom:8}}>
                <div style={{fontSize:9,fontWeight:700,color:"#EF4444",letterSpacing:0.5,marginBottom:4,textTransform:"uppercase"}}>Dificuldades relatadas</div>
                {difs.map(([txt,{count,dates}])=>(<div key={txt} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:T.sub,padding:"3px 0"}}><span>{txt}</span><span style={{color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>×{count}</span></div>))}
              </div>)}

              {ens.length>0&&(<div style={{marginBottom:8}}>
                <div style={{fontSize:9,fontWeight:700,color:user.accent,letterSpacing:0.5,marginBottom:4,textTransform:"uppercase"}}>📚 Aulas do professor</div>
                {ens.map((e,i)=>(<div key={i} style={{fontSize:12,color:T.sub,padding:"4px 0",borderBottom:i<ens.length-1?`1px solid ${T.border}`:"none"}}>
                  <span style={{color:T.muted,fontSize:10}}>{e.date}</span>{e.det&&<div style={{marginTop:1}}>{e.det}</div>}
                </div>))}
              </div>)}

              {notas.length>0&&(<div>
                <div style={{fontSize:9,fontWeight:700,color:T.muted,letterSpacing:0.5,marginBottom:4,textTransform:"uppercase"}}>Notas</div>
                {notas.map(n=>(<div key={n.id} style={{fontSize:12,color:T.sub,padding:"4px 0"}}><span style={{fontWeight:600,color:T.text}}>{n.titulo}</span>{n.detalhe&&<div style={{marginTop:1}}>{n.detalhe}</div>}</div>))}
              </div>)}
            </Box>
          ))}

          <Box>
            <Hdr t="Anotação Avulsa (opcional)" mb={8}/>
            <div style={{fontSize:11,color:T.muted,marginBottom:10,lineHeight:1.4}}>Use apenas se quiser registrar algo fora do fluxo normal de sessões.</div>
            <div style={{marginBottom:10}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {POS.map(p=>(<PillBtn key={p} label={p} small accent={user.accent} active={tecInp.posicao===p} onClick={()=>setTecInp(prev=>({...prev,posicao:p}))}/>))}
              </div>
            </div>
            <input value={tecInp.titulo} onChange={e=>setTecInp(p=>({...p,titulo:e.target.value}))} placeholder="Título" style={{...I,marginBottom:8}}/>
            <textarea value={tecInp.detalhe} onChange={e=>setTecInp(p=>({...p,detalhe:e.target.value}))} placeholder="Descrição..." rows={2} style={{...I,resize:"none",marginBottom:4}}/>
            {Sv("Salvar",saveTec)}
          </Box>
        </>);
      })()}

      {/* ── FAIXA ──────────────────────────────────────────────── */}
      {tab==="faixa"&&(()=>{
        const FAIXAS=["Branca","Azul","Roxa","Marrom","Preta"];
        const FCOLOR={Branca:"#D4D4D4",Azul:"#2563EB",Roxa:"#7C3AED",Marrom:"#92400E",Preta:"#171717"};
        const sorted=[...faixas].sort((a,b)=>a.data.localeCompare(b.data));
        const current=sorted[sorted.length-1];
        const daysSince=current?Math.floor((new Date()-new Date(current.data))/864e5):null;
        return(<>
          {current&&(<Box mb={14}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:50,height:50,borderRadius:12,background:FCOLOR[current.faixa],border:current.faixa==="Branca"?"1px solid #D4D4D4":"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {current.grau>0&&<span style={{color:"#FFF",fontSize:13,fontWeight:900,textShadow:"0 1px 2px rgba(0,0,0,0.4)"}}>{current.grau}°</span>}
              </div>
              <div>
                <div style={{fontSize:10,color:T.muted,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",marginBottom:2}}>Faixa Atual</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:T.text}}>{current.faixa}{current.grau>0?` ${current.grau}° grau`:""}</div>
                <div style={{fontSize:12,color:T.muted,marginTop:1}}>desde {current.data}{daysSince!=null?` · ${daysSince} dias`:""}</div>
              </div>
            </div>
          </Box>)}
          <Box>
            <Hdr t="Registrar Graduação"/>
