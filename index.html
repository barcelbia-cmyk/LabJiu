              </div>
            </div>
            {s.pos_trab?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:4}}>{s.pos_trab.map(p=>(<span key={p} style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:`${user.accent}12`,color:user.accent}}>{p}</span>))}</div>}
            {s.pos_ok&&<div style={{fontSize:12,color:T.done,marginBottom:2}}>✓ {s.pos_ok}</div>}
            {s.pos_nok&&<div style={{fontSize:12,color:"#EF4444",marginBottom:2}}>✗ {s.pos_nok}</div>}
            {s.notas&&<div style={{fontSize:11,color:T.muted,fontStyle:"italic"}}>{s.notas}</div>}
          </div>))}
          {jiuLog.length===0&&<div style={{padding:14,fontSize:13,color:T.muted}}>Nenhuma sessão registrada ainda.</div>}
        </div>
      </>)}

      {/* ── ROLAS ──────────────────────────────────────────────── */}
      {tab==="rolas"&&(<>
        {rolas.length>0&&(<Box mb={12}>
          <Hdr t="Resumo"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
            {[{l:"Total",v:rolas.length},{l:"Positivos",v:rolas.filter(r=>["Finalizei","Raspei","Passei"].includes(r.resultado)).length},{l:"Neutros",v:rolas.filter(r=>r.resultado==="Neutro").length},{l:"Negativos",v:rolas.filter(r=>["Fui passado","Fui raspado","Fui finalizado"].includes(r.resultado)).length}].map(({l,v})=>(<div key={l} style={{textAlign:"center",padding:"8px 4px",background:T.inpBg,borderRadius:8}}><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,color:user.accent,fontWeight:700}}>{v}</div><div style={{fontSize:10,color:T.muted,marginTop:1}}>{l}</div></div>))}
          </div>
        </Box>)}

        <Box>
          <Hdr t="Registrar Rola"/>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={rolaInp.parceiro} onChange={e=>setRolaInp(p=>({...p,parceiro:e.target.value}))} placeholder="Parceiro" style={{...I,flex:2}}/>
            <input value={rolaInp.peso} onChange={e=>setRolaInp(p=>({...p,peso:e.target.value}))} placeholder="Peso" inputMode="decimal" style={{...I,flex:1}}/>
          </div>
          <input value={rolaInp.nivel} onChange={e=>setRolaInp(p=>({...p,nivel:e.target.value}))} placeholder="Faixa / Nível" style={{...I,marginBottom:10}}/>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,color:T.muted,marginBottom:8}}>Resultado — toque para selecionar, + para repetições</div>
            {[{label:"Positivos",items:["Finalizei","Raspei","Passei"],color:T.done},{label:"Neutro",items:["Neutro"],color:T.sub},{label:"Negativos",items:["Fui finalizado","Fui raspado","Fui passado"],color:"#EF4444"}].map(({label,items,color})=>(
              <div key={label} style={{marginBottom:8}}>
                <div style={{fontSize:9,fontWeight:700,color:color,letterSpacing:1,marginBottom:5,textTransform:"uppercase"}}>{label}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {items.map(r=>{
                    const cnt=(rolaInp.resultados||{})[r]||0;
                    const setR=(n)=>setRolaInp(p=>{const rs={...(p.resultados||{})};if(n<=0)delete rs[r];else rs[r]=n;return{...p,resultados:rs};});
                    return(<div key={r} style={{display:"flex",alignItems:"center",gap:3}}>
                      <button onClick={()=>setR(cnt>0?0:1)} style={{padding:"6px 10px",borderRadius:20,border:`1.5px solid ${cnt>0?color:T.border}`,background:cnt>0?`${color}18`:T.inpBg,color:cnt>0?color:T.sub,fontSize:11,fontWeight:cnt>0?700:400,cursor:"pointer"}}>{r}</button>
                      {cnt>0&&<>
                        <button onClick={()=>setR(cnt-1)} style={{width:24,height:24,borderRadius:"50%",border:`1px solid ${T.border}`,background:T.inpBg,color:T.sub,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color,minWidth:18,textAlign:"center"}}>×{cnt}</span>
                        <button onClick={()=>setR(cnt+1)} style={{width:24,height:24,borderRadius:"50%",border:`1px solid ${color}`,background:`${color}12`,color,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
                      </>}
                    </div>);
                  })}
                </div>
              </div>
            ))}
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,color:T.muted,marginBottom:7}}>Posição dominante do rola</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {POS.slice(0,9).map(p=>(<PillBtn key={p} label={p} small active={rolaInp.posicao===p} onClick={()=>setRolaInp(prev=>({...prev,posicao:p}))}/>))}
            </div>
          </div>
          <textarea value={rolaInp.notas} onChange={e=>setRolaInp(p=>({...p,notas:e.target.value}))} placeholder="Observação do rola..." rows={2} style={{...I,resize:"none",marginBottom:4}}/>
          {Sv("Salvar Rola",saveRola)}
        </Box>

        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden"}}>
          
        {/* ── Análise acumulada ────────────────────── */}
        {rolas.length>=5&&(()=>{
          const wins=rolas.filter(r=>isPos(r)).length;
          const losses=rolas.filter(r=>isNeg(r)).length;
          const wr=Math.round((wins/rolas.length)*100);
          const posMap={};rolas.forEach(r=>{if(!r.posicao)return;if(!posMap[r.posicao])posMap[r.posicao]={t:0,w:0};posMap[r.posicao].t++;if(isPos(r))posMap[r.posicao].w++;});
          const posArr=Object.entries(posMap).filter(([,v])=>v.t>=2);
          const bestPos=posArr.length?[...posArr].sort((a,b)=>(b[1].w/b[1].t)-(a[1].w/a[1].t))[0]:null;
          const worstPos=posArr.length?[...posArr].sort((a,b)=>(a[1].w/a[1].t)-(b[1].w/b[1].t))[0]:null;
          const partMap={};rolas.forEach(r=>{if(!r.parceiro)return;if(!partMap[r.parceiro])partMap[r.parceiro]={t:0,w:0};partMap[r.parceiro].t++;if(isPos(r))partMap[r.parceiro].w++;});
          const topPartner=Object.entries(partMap).sort((a,b)=>b[1].t-a[1].t)[0];
          return(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden",marginBottom:14}}>
            <div style={{padding:"12px 14px 10px",borderBottom:`1px solid ${T.border}`}}>
              <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:10,textTransform:"uppercase"}}>Análise — {rolas.length} rolas</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:13,color:T.text,fontWeight:600}}>Aproveitamento geral</span>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:700,color:wr>=50?T.done:"#EF4444"}}>{wr}%</span>
              </div>
              <div style={{height:8,background:T.inpBg,borderRadius:4,overflow:"hidden",display:"flex"}}>
                <div style={{width:`${wr}%`,background:T.done,transition:"width 0.5s ease"}}/>
                <div style={{width:`${Math.round(((rolas.length-wins-losses)/rolas.length)*100)}%`,background:"#94A3B8"}}/>
                <div style={{flex:1,background:"#EF4444"}}/>
              </div>
              <div style={{display:"flex",gap:12,marginTop:6}}>
                {[{l:"Positivos",v:wins,c:T.done},{l:"Neutros",v:rolas.length-wins-losses,c:"#94A3B8"},{l:"Negativos",v:losses,c:"#EF4444"}].map(({l,v,c})=>(<span key={l} style={{fontSize:11,color:T.muted}}><span style={{color:c,fontWeight:700}}>{v}</span> {l}</span>))}
              </div>
            </div>
            {bestPos&&<div style={{padding:"10px 14px",borderBottom:`1px solid ${T.border}`}}>
              <div style={{fontSize:11,color:T.muted,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",marginBottom:8}}>Por Posição (mín. 2 rolas)</div>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1,padding:"8px",background:`${T.done}12`,borderRadius:8,border:`1px solid ${T.done}30`}}><div style={{fontSize:9,color:T.done,fontWeight:700,marginBottom:2}}>✓ MELHOR</div><div style={{fontSize:12,color:T.text,fontWeight:600}}>{bestPos[0]}</div><div style={{fontSize:11,color:T.muted}}>{Math.round((bestPos[1].w/bestPos[1].t)*100)}% · {bestPos[1].t}x</div></div>
                {worstPos&&worstPos[0]!==bestPos[0]&&<div style={{flex:1,padding:"8px",background:"#EF444412",borderRadius:8,border:"1px solid #EF444430"}}><div style={{fontSize:9,color:"#EF4444",fontWeight:700,marginBottom:2}}>✗ TRABALHAR</div><div style={{fontSize:12,color:T.text,fontWeight:600}}>{worstPos[0]}</div><div style={{fontSize:11,color:T.muted}}>{Math.round((worstPos[1].w/worstPos[1].t)*100)}% · {worstPos[1].t}x</div></div>}
              </div>
            </div>}
            {topPartner&&<div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:10,color:T.muted,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",marginBottom:2}}>Parceiro mais frequente</div><div style={{fontSize:13,color:T.text,fontWeight:600}}>{topPartner[0]}</div><div style={{fontSize:11,color:T.muted}}>{Math.round((topPartner[1].w/topPartner[1].t)*100)}% positivos</div></div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:24,fontWeight:700,color:user.accent}}>{topPartner[1].t}</div>
            </div>}
          </div>);
        })()}
        
        {rolas.slice(0,25).map((r,i,arr)=>(<div key={i} style={{padding:"10px 14px",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:13,fontWeight:700,color:T.text}}>{r.parceiro}</span>
                {r.peso&&<span style={{fontSize:11,color:T.muted,fontFamily:"'JetBrains Mono',monospace"}}>{r.peso}kg</span>}
                {r.nivel&&<span style={{fontSize:11,color:T.muted}}>{r.nivel}</span>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:3,justifyContent:"flex-end",maxWidth:160}}>
                  {r.resultados&&Object.keys(r.resultados).length>0
                    ?Object.entries(r.resultados).filter(([,v])=>v>0).map(([k,v])=>(<span key={k} style={{fontSize:11,fontWeight:700,color:RES_C[k]||T.sub,whiteSpace:"nowrap"}}>{v>1?`${k} ×${v}`:k}</span>))
                    :<span style={{fontSize:11,fontWeight:700,color:RES_C[r.resultado]||T.sub}}>{r.resultado}</span>}
                </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {r.posicao&&<span style={{fontSize:10,color:user.accent,background:`${user.accent}12`,padding:"1px 7px",borderRadius:10}}>{r.posicao}</span>}
              <span style={{fontSize:10,color:T.muted}}>{r.date}</span>
            </div>
            {r.notas&&<div style={{fontSize:11,color:T.muted,fontStyle:"italic",marginTop:3}}>{r.notas}</div>}
          </div>))}
          {rolas.length===0&&<div style={{padding:14,fontSize:13,color:T.muted}}>Nenhum rola registrado ainda.</div>}
        </div>
      </>)}

      {/* ── TÉCNICO ────────────────────────────────────────────── */}
      {tab==="tecnico"&&(<>
        <Box>
          <Hdr t="Adicionar Detalhe Técnico"/>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:12,color:T.muted,marginBottom:7}}>Posição</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {POS.map(p=>(<PillBtn key={p} label={p} small active={tecInp.posicao===p} onClick={()=>setTecInp(prev=>({...prev,posicao:p}))}/>))}
            </div>
          </div>
          <input value={tecInp.titulo} onChange={e=>setTecInp(p=>({...p,titulo:e.target.value}))} placeholder="Título (ex: quando o quadril resiste no single...)" style={{...I,marginBottom:8}}/>
          <textarea value={tecInp.detalhe} onChange={e=>setTecInp(p=>({...p,detalhe:e.target.value}))} placeholder="Descrição completa do detalhe técnico..." rows={3} style={{...I,resize:"none",marginBottom:4}}/>
          {Sv("Salvar Detalhe",saveTec)}
        </Box>
        <input value={tecSearch} onChange={e=>setTecSearch(e.target.value)} placeholder="🔍 Buscar posição, palavra-chave..." style={{...I,marginBottom:12}}/>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,overflow:"hidden"}}>
          {filtTec.map((t,i,arr)=>(<div key={t.id} style={{padding:"12px 14px",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:10,color:user.accent,background:`${user.accent}12`,padding:"2px 8px",borderRadius:10,fontWeight:700}}>{t.posicao}</span>
              <span style={{fontSize:10,color:T.muted}}>{t.date}</span>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>{t.titulo}</div>
            {t.detalhe&&<div style={{fontSize:13,color:T.sub,lineHeight:1.65}}>{t.detalhe}</div>}
          </div>))}
          {filtTec.length===0&&<div style={{padding:14,fontSize:13,color:T.muted}}>{tecSearch?"Nenhum resultado para essa busca.":"Comece a registrar detalhes técnicos após os treinos."}</div>}
        </div>
      </>)}

      {/* ── POSIÇÕES ───────────────────────────────────────────── */}
      {tab==="posicoes"&&(()=>{
        const POSITIVOS=["Finalizei","Raspei","Passei"];
        const NEGATIVOS=["Fui finalizado","Fui raspado","Fui passado"];
        const countR=(r,list)=>r.resultados?Object.entries(r.resultados).filter(([k])=>list.includes(k)).reduce((a,[,v])=>a+v,0):(list.includes(r.resultado)?1:0);
        const byPos={};
        rolas.forEach(r=>{
          if(!r.posicao)return;
          if(!byPos[r.posicao])byPos[r.posicao]=[];
          byPos[r.posicao].push(r);
        });
        const posStats=Object.entries(byPos).filter(([,arr])=>arr.length>=2).map(([pos,arr])=>{
          const sorted=[...arr].sort((a,b)=>a.date.localeCompare(b.date));
          const totalW=sorted.reduce((a,r)=>a+countR(r,POSITIVOS),0);
          const totalL=sorted.reduce((a,r)=>a+countR(r,NEGATIVOS),0);
          const totalEvents=totalW+totalL;
          const score=totalEvents>0?Math.round((totalW/totalEvents)*10*10)/10:5;
          // Trend: compare first half vs second half
          let trend=null;
          if(sorted.length>=4){
            const mid=Math.floor(sorted.length/2);
            const older=sorted.slice(0,mid);const recent=sorted.slice(mid);
            const oW=older.reduce((a,r)=>a+countR(r,POSITIVOS),0);const oL=older.reduce((a,r)=>a+countR(r,NEGATIVOS),0);
            const rW=recent.reduce((a,r)=>a+countR(r,POSITIVOS),0);const rL=recent.reduce((a,r)=>a+countR(r,NEGATIVOS),0);
            const oScore=(oW+oL)>0?(oW/(oW+oL))*10:5;
            const rScore=(rW+rL)>0?(rW/(rW+rL))*10:5;
            trend=Math.round((rScore-oScore)*10)/10;
          }
          return{pos,score,trend,rolas:sorted.length,wins:totalW,losses:totalL};
        }).sort((a,b)=>b.rolas-a.rolas);

        return(<>
          <Box>
            <Hdr t="Evolução por Posição" mb={6}/>
            <div style={{fontSize:11,color:T.muted,marginBottom:14,lineHeight:1.5}}>Calculado automaticamente a partir dos seus rolas registrados — não é autoavaliação.</div>
            {posStats.length===0&&<div style={{fontSize:13,color:T.muted,fontStyle:"italic"}}>Registre rolas com a posição marcada para ver sua evolução aqui (mínimo 2 rolas por posição).</div>}
            {posStats.map(({pos,score,trend,rolas:rc,wins,losses})=>(
              <div key={pos} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <span style={{fontSize:13,color:T.text,fontWeight:600}}>{pos}</span>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {trend!==null&&Math.abs(trend)>=0.3&&<span style={{fontSize:11,fontWeight:700,color:trend>0?T.done:"#EF4444"}}>{trend>0?"↑":"↓"}{Math.abs(trend).toFixed(1)}</span>}
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:15,color:score>=7?T.done:score>=5?user.accent:"#EF4444",fontWeight:700}}>{score.toFixed(1)}/10</span>
                  </div>
                </div>
                <div style={{height:7,background:T.inpBg,borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${score*10}%`,background:score>=7?T.done:score>=5?user.accent:"#EF4444",borderRadius:4,transition:"width 0.4s ease"}}/>
                </div>
                <div style={{fontSize:10,color:T.muted,marginTop:3}}>{rc} rolas · {wins} positivos · {losses} negativos</div>
              </div>
            ))}
          </Box>
          {posStats.length>0&&(<Box>
            <Hdr t="Como o Score é Calculado"/>
            <div style={{fontSize:12,color:T.sub,lineHeight:1.7}}>
              O score (0-10) reflete seu aproveitamento real nessa posição: Finalizei/Raspei/Passei contam como positivo, Fui finalizado/raspado/passado como negativo. A seta mostra a tendência comparando a primeira metade dos rolas registrados com a mais recente — evolução de verdade, não percepção.
            </div>
          </Box>)}
        </>);
      })()}

      {/* ── FAIXA ──────────────────────────────────────────────── */}
      {tab==="faixa"&&(()=>{
        const FAIXAS=["Branca","Azul","Roxa","Marrom","Preta"];
        const FCOLOR={Branca:"#D4D4D4",Azul:"#2563EB",Roxa:"#7C3AED",Marrom:"#92400E",Preta:"#171717"};
        const sorted=[...faixas].sort((a,b)=>a.data.localeCompare(b.data));
        const current=sorted[sorted.length-1];
        const daysSince=current?Math.floor((new Date()-new Date(current.data))/864e5):null;
        return(<>
          {current&&(<Box mb={14}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:50,height:50,borderRadius:12,background:FCOLOR[current.faixa],border:current.faixa==="Branca"?"1px solid #D4D4D4":"none",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {current.grau>0&&<span style={{color:"#FFF",fontSize:13,fontWeight:900,textShadow:"0 1px 2px rgba(0,0,0,0.4)"}}>{current.grau}°</span>}
              </div>
              <div>
                <div style={{fontSize:10,color:T.muted,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",marginBottom:2}}>Faixa Atual</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:700,color:T.text}}>{current.faixa}{current.grau>0?` ${current.grau}° grau`:""}</div>
                <div style={{fontSize:12,color:T.muted,marginTop:1}}>desde {current.data}{daysSince!=null?` · ${daysSince} dias`:""}</div>
              </div>
            </div>
          </Box>)}
          <Box>
            <Hdr t="Registrar Graduação"/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {FAIXAS.map(f=>(<button key={f} onClick={()=>setFaixaInp(p=>({...p,faixa:f}))} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 12px",borderRadius:20,border:`1.5px solid ${faixaInp.faixa===f?FCOLOR[f]:T.border}`,background:faixaInp.faixa===f?`${FCOLOR[f]}15`:T.inpBg,cursor:"pointer"}}>
                <div style={{width:14,height:14,borderRadius:4,background:FCOLOR[f],border:f==="Branca"?"1px solid #D4D4D4":"none"}}/>
                <span style={{fontSize:12,color:faixaInp.faixa===f?T.text:T.sub,fontWeight:faixaInp.faixa===f?700:400}}>{f}</span>
              </button>))}
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:13,color:T.sub}}>Grau</span>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <button onClick={()=>setFaixaInp(p=>({...p,grau:Math.max(0,p.grau-1)}))} style={{width:32,height:32,borderRadius:8,border:`1px solid ${T.border}`,background:T.inpBg,color:T.text,fontSize:16,cursor:"pointer"}}>−</button>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:700,color:user.accent,minWidth:24,textAlign:"center"}}>{faixaInp.grau}</span>
                <button onClick={()=>setFaixaInp(p=>({...p,grau:Math.min(4,p.grau+1)}))} style={{width:32,height:32,borderRadius:8,border:`1px solid ${T.border}`,background:T.inpBg,color:T.text,fontSize:16,cursor:"pointer"}}>+</button>
              </div>
            </div>
            <input type="date" value={faixaInp.data} onChange={e=>setFaixaInp(p=>({...p,data:e.target.value}))} style={{...I,marginBottom:8}}/>
            <input value={faixaInp.notas} onChange={e=>setFaixaInp(p=>({...p,notas:e.target.value}))} placeholder="Quem graduou, onde, contexto..." style={{...I,marginBottom:4}}/>
            {Sv("Salvar Graduação",saveFaixa)}
          </Box>
          {sorted.length>0&&(<Box mb={0}>
            <Hdr t="Linha do Tempo"/>
            <div style={{position:"relative",paddingLeft:20}}>
              <div style={{position:"absolute",left:5,top:6,bottom:6,width:2,background:T.border}}/>
              {[...sorted].reverse().map((f,i,arr)=>(<div key={f.id} style={{position:"relative",paddingBottom:i<arr.length-1?16:0}}>
                <div style={{position:"absolute",left:-20,top:2,width:12,height:12,borderRadius:"50%",background:FCOLOR[f.faixa],border:`2px solid ${T.card}`,boxShadow:`0 0 0 1px ${T.border}`}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:T.text}}>{f.faixa}{f.grau>0?` ${f.grau}° grau`:""}</div>
                    <div style={{fontSize:11,color:T.muted,marginTop:1}}>{f.data}</div>
                    {f.notas&&<div style={{fontSize:12,color:T.sub,marginTop:3,lineHeight:1.4}}>{f.notas}</div>}
                  </div>
                  <button onClick={()=>delFaixa(f.id)} style={{background:"transparent",border:"none",color:T.muted,fontSize:16,cursor:"pointer",padding:"0 4px"}}>×</button>
                </div>
              </div>))}
            </div>
          </Box>)}
        </>);
      })()}

function HistoryView({user,plans}){
  const[sessions,setSessions]=useState(null);
  useEffect(()=>{(async()=>{const keys=await sList(sk(user.id,"sess",""));const out=[];for(const k of keys){const s=await sGet(k);if(s)out.push(s);}setSessions(out.sort((a,b)=>b.date.localeCompare(a.date)));})();},[user.id]);
  const allExs=Object.values(plans).flatMap(p=>p.exercises);
  if(!sessions)return <div style={{color:T.muted,fontSize:13,padding:"30px 0",textAlign:"center"}}>Carregando...</div>;
  if(!sessions.length)return <div style={{color:T.muted,fontSize:13,padding:"30px 0",textAlign:"center",fontStyle:"italic"}}>Nenhum treino registrado ainda.</div>;
  return(
    <div>
      {sessions.map((s,i)=>{
        const logged=Object.entries(s.exercises||{}).filter(([,d])=>d.cardio_done||d.sets?.some(x=>x.done));
        return(<div key={i} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
          <div style={{padding:"12px 14px",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:700,color:user.accent}}>{s.planName||s.type}</div><div style={{fontSize:11,color:T.muted,marginTop:1}}>{s.date} · {s.startTime}–{s.endTime} · {s.durationMin}min</div></div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:T.muted}}>{logged.length} ex</div>
          </div>
          <div style={{padding:"6px 14px"}}>
            {logged.slice(0,6).map(([id,d])=>{const ex=allExs.find(e=>e.id===id);const ds=(d.sets||[]).filter(s=>s.done);const lw=ds.length?ds[ds.length-1].w:null;return(<div key={id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${T.border}`,fontSize:12}}><span style={{color:T.text}}>{ex?.name||id}</span>{d.cardio_done?<span style={{color:T.done}}>✓</span>:<span style={{color:T.sub,fontFamily:"'JetBrains Mono',monospace"}}>{ds.length}s{lw?` · ${lw}`:""}</span>}</div>);})}
            {s.notes&&<div style={{fontSize:11,color:T.muted,fontStyle:"italic",padding:"6px 0",borderTop:`1px solid ${T.border}`,marginTop:2}}>{s.notes}</div>}
          </div>
        </div>);
      })}
    </div>
  );
}

function DashboardView({user,plans,setPillar}){
  const[data,setData]=useState(null);
  useEffect(()=>{
    (async()=>{
      const ws=new Date();ws.setDate(ws.getDate()-7);const wsStr=ws.toISOString().split("T")[0];
      // Treinos semana
      const skeys=await sList(sk(user.id,"sess",""));let treinos=0;
      for(const k of skeys){const s=await sGet(k);if(s&&s.date>=wsStr)treinos++;}
      // Jiu sessões + fadiga
      const jiuLog=await sGet(sk(user.id,"jiu"),[]);
      const jiuWeek=jiuLog.filter(s=>s.date>=wsStr);
      const avgFadiga=jiuWeek.length?Math.round(jiuWeek.reduce((a,s)=>{const f=s.fadiga||{};return a+((f.sono||0)+(f.disposicao||0)+(f.corpo||0))/3;},0)/jiuWeek.length*10)/10:null;
      // Nutrição (dias com 3+ refeições)
      let nutriOk=0;
      for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];const n=await sGet(sk(user.id,"nutri",ds),null);if(n&&(n.done_meals||[]).length>=3)nutriOk++;}
      // Peso atual + meta
      const pesos=await sGet(sk(user.id,"weight"),[]);
      const pesoAtual=pesos.length?pesos[pesos.length-1].weight:null;
      const pesoAnterior=pesos.length>1?pesos[pesos.length-2].weight:null;
      // Rolas semana
      const rolas=await sGet(sk(user.id,"rolas"),[]);
      const rolasWeek=rolas.filter(r=>r.date>=wsStr);
      const winsWeek=rolasWeek.filter(r=>["Finalizei","Raspei","Passei"].some(p=>r.resultado?.includes(p)||(r.resultados&&r.resultados[p]>0))).length;
      // Correlações: sono vs rolas
      const rolasByDate={};rolas.forEach(r=>{if(!rolasByDate[r.date])rolasByDate[r.date]=[];rolasByDate[r.date].push(r);});
      let hW=0,hT=0,lW=0,lT=0;
      jiuLog.forEach(s=>{const dr=rolasByDate[s.date]||[];if(!dr.length)return;const w=dr.filter(r=>["Finalizei","Raspei","Passei"].some(p=>r.resultado?.includes(p)||(r.resultados&&r.resultados[p]>0))).length;if((s.fadiga?.sono||0)>=4){hW+=w;hT+=dr.length;}else if((s.fadiga?.sono||0)>0){lW+=w;lT+=dr.length;}});
      const correlacoes=[];
      if(hT>=5&&lT>=5){const hR=Math.round((hW/hT)*100);const lR=Math.round((lW/lT)*100);correlacoes.push({icon:"😴",title:"Sono → Aproveitamento nos Rolas",desc:`Sono 4-5/5: ${hR}% positivos. Sono 1-3/5: ${lR}% positivos. Diferença: ${Math.abs(hR-lR)}pp.`});}
      const cfg=window.__config||DEF_CFG[user.id];

      // ── Índice de Prontidão ─────────────────────────────────
      // Fator 1: Sono (última sessão de Jiu com fadiga)
      const lastJiuFadiga=jiuLog.find(s=>s.fadiga?.sono);
      const sonoScore=lastJiuFadiga?.fadiga?.sono||3;
      const sonoFactor=(sonoScore/5)*3; // 0–3

      // Fator 2: Carga semanal (inversamente proporcional)
      const cargaFactor=Math.max(0,2.5-(treinos*0.45)); // 0–2.5

      // Fator 3: Dias consecutivos de treino (recuperação)
      let consec=0;
      for(let i=1;i<=7;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];const hasJiu=jiuLog.some(s=>s.date===ds);let hasGym=false;for(const k of skeys){const s=await sGet(k);if(s&&s.date===ds){hasGym=true;break;}}if(hasJiu||hasGym)consec++;else break;}
      const consecFactor=consec<=1?2.5:consec<=2?2.0:consec<=3?1.3:consec<=4?0.8:0.3; // 0–2.5

      // Fator 4: Nutrição (proteína média últimos 2 dias)
      let protSum=0,protN=0;
      for(let i=1;i<=2;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().split("T")[0];const n=await sGet(sk(user.id,"nutri",ds),null);if(n){const pr=user.id==="G"?MEALS_G:MEALS_B;const k=pr.filter(m=>(n.done_meals||[]).includes(m.id)).reduce((a,m)=>a+m.prot,0)+(n.extras||[]).reduce((a,e)=>a+(e.prot||0),0);if(k>0){protSum+=k;protN++;}}}
      const avgProt2=protN>0?protSum/protN:0;
      const nutFactor=cfg.proteinTarget>0?Math.min(2,( avgProt2/cfg.proteinTarget)*2):1.2; // 0–2

      const readiness=Math.min(10,Math.max(1,Math.round((sonoFactor+cargaFactor+consecFactor+nutFactor)*10)/10));
      const readinessFactors={sono:sonoScore,carga:treinos,consec,prot:Math.round(avgProt2),protTarget:cfg.proteinTarget};

      // ── Padrões de Alto Desempenho ──────────────────────────
      const padroes=[];
      if(jiuLog.length>=8&&rolas.length>=10){
        // Sono alto vs baixo
        if(hT>=4&&lT>=4){
          const hR=Math.round((hW/hT)*100);const lR=Math.round((lW/lT)*100);
          if(Math.abs(hR-lR)>=10) padroes.push({icon:"😴",cond:`Sono 4-5/5`,val:`${hR}% positivos nos rolas`,vs:`vs ${lR}% com sono baixo`});
        }
        // Carga semanal vs performance Jiu
        const jiuComDados=jiuLog.filter(s=>s.fadiga?.sono&&rolasByDate[s.date]?.length);
        if(jiuComDados.length>=6){
          // Find sessions where week had 2 or fewer vs 4+ gym sessions
          // Use disposição as proxy for training load impact
          const altaDisp=jiuLog.filter(s=>(s.fadiga?.disposicao||0)>=4&&rolasByDate[s.date]?.length);
          const baixaDisp=jiuLog.filter(s=>(s.fadiga?.disposicao||0)<=2&&rolasByDate[s.date]?.length);
          if(altaDisp.length>=3&&baixaDisp.length>=3){
            const aW=altaDisp.reduce((a,s)=>a+rolasByDate[s.date].filter(r=>["Finalizei","Raspei","Passei"].includes(r.resultado)).length,0);
            const aT=altaDisp.reduce((a,s)=>a+rolasByDate[s.date].length,0);
            const bW=baixaDisp.reduce((a,s)=>a+rolasByDate[s.date].filter(r=>["Finalizei","Raspei","Passei"].includes(r.resultado)).length,0);
            const bT=baixaDisp.reduce((a,s)=>a+rolasByDate[s.date].length,0);
            const aR=Math.round((aW/aT)*100);const bR=Math.round((bW/bT)*100);
            if(Math.abs(aR-bR)>=10) padroes.push({icon:"💪",cond:`Alta disposição (4-5/5)`,val:`${aR}% positivos nos rolas`,vs:`vs ${bR}% com baixa disposição`});
          }
        }
        // Melhor combinação (best conditions summary)
        const bestSessions=jiuLog.filter(s=>s.fadiga&&(s.fadiga.sono>=4)&&(s.fadiga.disposicao>=4)&&rolasByDate[s.date]?.length);
        if(bestSessions.length>=3){
          const bW=bestSessions.reduce((a,s)=>a+rolasByDate[s.date].filter(r=>["Finalizei","Raspei","Passei"].includes(r.resultado)).length,0);
          const bT=bestSessions.reduce((a,s)=>a+rolasByDate[s.date].length,0);
          const bR=Math.round((bW/bT)*100);
          padroes.push({icon:"⚡",cond:`Sono ≥4 + Disposição ≥4`,val:`${bR}% aproveitamento (${bestSessions.length} sessões)`,vs:`seu melhor estado`});
        }
      }

      // ── Resumo Mensal (mês anterior completo) ──────────────
      const monthSummary=await(async()=>{
        const now=new Date();
        const lastMonthDate=new Date(now.getFullYear(),now.getMonth()-1,1);
        const lmStart=new Date(lastMonthDate.getFullYear(),lastMonthDate.getMonth(),1).toISOString().split("T")[0];
        const lmEnd=new Date(lastMonthDate.getFullYear(),lastMonthDate.getMonth()+1,0).toISOString().split("T")[0];
        const monthName=lastMonthDate.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
        // Treinos do mês
        let mTreinos=0;
        for(const k of skeys){const s=await sGet(k);if(s&&s.date>=lmStart&&s.date<=lmEnd)mTreinos++;}
        // Jiu do mês
        const mJiu=jiuLog.filter(s=>s.date>=lmStart&&s.date<=lmEnd);
        // Rolas do mês
        const mRolas=rolas.filter(r=>r.date>=lmStart&&r.date<=lmEnd);
        const POSITIVOS4=["Finalizei","Raspei","Passei"];const NEGATIVOS4=["Fui finalizado","Fui raspado","Fui passado"];
        const countR4=(r,list)=>r.resultados?Object.entries(r.resultados).filter(([k])=>list.includes(k)).reduce((a,[,v])=>a+v,0):(list.includes(r.resultado)?1:0);
        const mWins=mRolas.reduce((a,r)=>a+countR4(r,POSITIVOS4),0);
        const mLosses=mRolas.reduce((a,r)=>a+countR4(r,NEGATIVOS4),0);
        const mWinRate=(mWins+mLosses)>0?Math.round((mWins/(mWins+mLosses))*100):null;
        // Peso início/fim do mês
        const mPesos=pesos.filter(p=>p.date>=lmStart&&p.date<=lmEnd).sort((a,b)=>a.date.localeCompare(b.date));
        const pesoIni=mPesos.length?mPesos[0].weight:null;
        const pesoFim=mPesos.length?mPesos[mPesos.length-1].weight:null;
        const pesoDelta=(pesoIni!=null&&pesoFim!=null)?Math.round((pesoFim-pesoIni)*10)/10:null;
        // Nutrição: dias com 3+ refeições no mês
        let mNutriOk=0,mNutriDays=0;
        const lmStartD=new Date(lmStart);const lmEndD=new Date(lmEnd);
        for(let d=new Date(lmStartD);d<=lmEndD;d.setDate(d.getDate()+1)){const ds=d.toISOString().split("T")[0];const n=await sGet(sk(user.id,"nutri",ds),null);if(n){mNutriDays++;if((n.done_meals||[]).length>=3)mNutriOk++;}}
        // Melhor e pior semana (por treinos combinados)
        const weekCounts={};
        for(const k of skeys){const s=await sGet(k);if(s&&s.date>=lmStart&&s.date<=lmEnd){const wn=Math.ceil((new Date(s.date)-lmStartD)/(7*864e5));weekCounts[wn]=(weekCounts[wn]||0)+1;}}
        mJiu.forEach(s=>{const wn=Math.ceil((new Date(s.date)-lmStartD)/(7*864e5));weekCounts[wn]=(weekCounts[wn]||0)+1;});
        const weekEntries=Object.entries(weekCounts);
        const bestWeek=weekEntries.length?weekEntries.sort((a,b)=>b[1]-a[1])[0]:null;
        const hasData=mTreinos>0||mJiu.length>0||mRolas.length>0;
        if(!hasData)return null;
        return{monthName,mTreinos,mJiuCount:mJiu.length,mRolasCount:mRolas.length,mWinRate,pesoDelta,mNutriOk,mNutriDays,bestWeekNum:bestWeek?bestWeek[0]:null,bestWeekCount:bestWeek?bestWeek[1]:null};
      })();

      setData({treinos,jiuSess:jiuWeek.length,nutriOk,pesoAtual,pesoAnterior,avgFadiga,rolasWeek:rolasWeek.length,winsWeek,goalWeight:cfg.goalWeight,goalDate:cfg.goalDate,correlacoes,readiness,readinessFactors,padroes,monthSummary});
    })();
  },[user.id]);

  if(!data)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"60px 0",color:T.muted,fontSize:13}}>Carregando...</div>);

  const daysLeft=data.goalDate?Math.max(0,Math.ceil((new Date(data.goalDate)-new Date())/864e5)):null;
  const pesoTrend=data.pesoAtual&&data.pesoAnterior?data.pesoAtual-data.pesoAnterior:null;

  const Stat=({icon,label,value,sub,color,onClick})=>(<button onClick={onClick} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 12px",textAlign:"left",cursor:onClick?"pointer":"default",width:"100%"}}>
    <div style={{fontSize:20,marginBottom:6}}>{icon}</div>
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:24,fontWeight:700,color:color||T.text,lineHeight:1,letterSpacing:-0.5}}>{value}</div>
    <div style={{fontSize:11,color:T.muted,marginTop:4,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:T.sub,marginTop:2}}>{sub}</div>}
  </button>);

  // Insights
  const insights=[];
  if(data.treinos>=3)insights.push({icon:"🔥",text:"Semana consistente na academia!",c:user.accent});
  else if(data.treinos===0)insights.push({icon:"⚠️",text:"Nenhum treino esta semana ainda.",c:"#F59E0B"});
  if(data.jiuSess>=2)insights.push({icon:"🥋",text:`${data.jiuSess} treinos de Jiu — volume bom.`,c:"#EF4444"});
  if(data.nutriOk>=5)insights.push({icon:"🥗",text:"Nutrição em dia — 5+ dias com metas.",c:"#10B981"});
  else if(data.nutriOk<=2)insights.push({icon:"⚠️",text:"Nutrição abaixo — menos de 3 dias ok.",c:"#F59E0B"});
  if(data.avgFadiga&&data.avgFadiga<=2.5)insights.push({icon:"😴",text:"Fadiga alta nas sessões — priorize o sono.",c:"#8B5CF6"});
  if(data.winsWeek>0&&data.rolasWeek>0){const wr=Math.round((data.winsWeek/data.rolasWeek)*100);insights.push({icon:"⚡",text:`${wr}% de aproveitamento nos rolas da semana.`,c:user.accent});}
  if(pesoTrend!==null){const dir=pesoTrend<0?"↓ ":"↑ ";insights.push({icon:"⚖️",text:`Peso ${dir}${Math.abs(pesoTrend).toFixed(1)}kg desde última medição.`,c:pesoTrend<=0?T.done:"#EF4444"});}

  const today=new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});

  return(<div>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:12,color:T.muted,marginBottom:2,textTransform:"capitalize"}}>{today}</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:700,color:T.text,letterSpacing:-0.5}}>Semana de {user.name}</div>
    </div>

    {/* 4 main stats */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <Stat icon="🏋️" label="Treinos" value={data.treinos} sub="esta semana" color={user.accent} onClick={()=>setPillar("fisico")}/>
      <Stat icon="🥋" label="Jiu" value={data.jiuSess} sub="sessões" color="#EF4444" onClick={()=>setPillar("jiu")}/>
      <Stat icon="🥗" label="Nutrição" value={`${data.nutriOk}/7`} sub="dias com metas" color="#10B981" onClick={()=>setPillar("nutricao")}/>
      <Stat icon="⚡" label="Rolas" value={data.rolasWeek} sub={data.rolasWeek>0?`${data.winsWeek} positivos`:"esta semana"} color="#F59E0B" onClick={()=>setPillar("jiu")}/>
    </div>

    {/* Peso + meta */}
    {data.pesoAtual&&(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Peso Atual</div>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,color:T.text,letterSpacing:-1}}>{data.pesoAtual}<span style={{fontSize:14,color:T.muted}}>kg</span></span>
            {pesoTrend!==null&&<span style={{fontSize:12,fontWeight:700,color:pesoTrend<=0?T.done:"#EF4444"}}>{pesoTrend>0?"+":""}{pesoTrend.toFixed(1)}kg</span>}
          </div>
        </div>
        {data.goalWeight&&<div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>Meta</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:user.accent}}>{data.goalWeight}<span style={{fontSize:13,color:T.muted}}>kg</span></div>
          {daysLeft!==null&&<div style={{fontSize:11,color:T.muted}}>{daysLeft} dias</div>}
        </div>}
      </div>
      {data.goalWeight&&(<div style={{height:6,background:T.inpBg,borderRadius:3}}>
        {(()=>{const start=100;const pct=Math.min(100,Math.max(0,Math.round(((start-data.pesoAtual)/(start-data.goalWeight))*100)));return <div style={{height:"100%",width:`${pct}%`,background:pct>=100?T.done:user.accent,borderRadius:3,transition:"width 0.4s ease"}}/>;})()}
      </div>)}
    </div>)}

    {/* Insights */}
    {insights.length>0&&(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:10,textTransform:"uppercase"}}>Insights da Semana</div>
      {insights.map((ins,i)=>(<div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:i<insights.length-1?`1px solid ${T.border}`:"none",alignItems:"flex-start"}}>
        <span style={{fontSize:16,flexShrink:0}}>{ins.icon}</span>
        <span style={{fontSize:13,color:T.sub,lineHeight:1.5}}>{ins.text}</span>
      </div>))}
    </div>)}

    {/* Fadiga */}
    {data.avgFadiga&&(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:11,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>Fadiga Média no Jiu</div>
        <div style={{fontSize:12,color:T.sub}}>{data.avgFadiga<=2?"Alta fadiga — considere descanso":data.avgFadiga<=3.5?"Moderada — atenção ao sono":"Boa prontidão"}</div></div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,color:data.avgFadiga<=2?"#EF4444":data.avgFadiga<=3.5?"#F59E0B":T.done}}>{data.avgFadiga}</div>
      </div>
    </div>)}

    {/* ── Protocolo de Competição ──────────────────── */}
    {(()=>{
      const gd=(window.__config?.goalDate)||data.goalDate;
      if(!gd)return null;
      const dl=Math.max(0,Math.ceil((new Date(gd)-new Date())/864e5));
      if(dl>90)return null;
      const gw=(window.__config?.goalWeight)||data.goalWeight;
      const phaseCfg=dl<=3?{label:"COMPETIÇÃO",color:"#EF4444",tip:"Acorda cedo, café leve, aquecimento progressivo. Mente no processo."}:dl<=7?{label:"RETA FINAL",color:"#F97316",tip:"Treinos levíssimos. Hidratação máxima. Nada de novo."}:dl<=14?{label:"SEMANA DECISIVA",color:"#F59E0B",tip:"Reduza o volume pela metade. Priorize sono e técnica."}:dl<=30?{label:"AFINAMENTO",color:user.accent,tip:"Mantenha intensidade, reduza volume. Revise adversários."}:{label:"PREPARAÇÃO",color:T.done,tip:"Fase normal — foco em técnica e condicional."};
      return(<div style={{background:T.card,border:`2px solid ${phaseCfg.color}30`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div><div style={{fontSize:10,fontWeight:700,color:phaseCfg.color,letterSpacing:1.2,marginBottom:3,textTransform:"uppercase"}}>Protocolo de Competição</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:T.text,letterSpacing:-0.3}}>{phaseCfg.label}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:700,color:phaseCfg.color,lineHeight:1}}>{dl}</div><div style={{fontSize:10,color:T.muted}}>dias</div></div>
        </div>
        <div style={{fontSize:13,color:T.sub,lineHeight:1.6,marginBottom:10}}>{phaseCfg.tip}</div>
        {gw&&data.pesoAtual&&(()=>{const diff=data.pesoAtual-gw;return diff>0&&(<div style={{background:`${phaseCfg.color}12`,borderRadius:8,padding:"8px 10px",fontSize:12,color:phaseCfg.color,fontWeight:600}}>⚖ Corte necessário: {diff.toFixed(1)}kg — {diff<=2?"dentro do possível na semana":"planeje com antecedência"}</div>);})()}
        {dl<=14&&<div style={{marginTop:10}}>
          <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1,marginBottom:6,textTransform:"uppercase"}}>Checklist</div>
          {[dl<=14&&"Revisar adversários cadastrados",dl<=7&&"Parar treinos de força pesados",dl<=7&&"Sono mínimo 8h",dl<=3&&"Refeição familiar na véspera",dl<=3&&"Kimono, faixa e documentos prontos"].filter(Boolean).map((item,i)=>(<div key={i} style={{display:"flex",gap:8,padding:"5px 0",fontSize:12,color:T.sub}}><span style={{color:phaseCfg.color}}>□</span>{item}</div>))}
        </div>}
      </div>);
    })()}

    {/* ── Correlações ───────────────────────────────── */}
    {(()=>{
      if(!data.correlacoes||data.correlacoes.length===0)return null;
      return(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px"}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:10,textTransform:"uppercase"}}>Correlações Detectadas</div>
        {data.correlacoes.map((c,i,arr)=>(<div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none",alignItems:"flex-start"}}>
          <span style={{fontSize:18,flexShrink:0}}>{c.icon}</span>
          <div><div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:2}}>{c.title}</div><div style={{fontSize:12,color:T.sub,lineHeight:1.5}}>{c.desc}</div></div>
        </div>))}
      </div>);
    })()}

    {/* ── Resumo Mensal ──────────────────────────────── */}
    {data.monthSummary&&(()=>{
      const m=data.monthSummary;
      return(<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 16px",marginTop:12}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,letterSpacing:1.2,marginBottom:3,textTransform:"uppercase"}}>Resumo do Mês</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:T.text,marginBottom:12,textTransform:"capitalize"}}>{m.monthName}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:user.accent}}>{m.mTreinos}</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>treinos de força</div>
          </div>
          <div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:"#EF4444"}}>{m.mJiuCount}</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>sessões de Jiu</div>
          </div>
          {m.mWinRate!=null&&<div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:m.mWinRate>=50?T.done:"#F97316"}}>{m.mWinRate}%</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>aproveitamento ({m.mRolasCount} rolas)</div>
          </div>}
          {m.pesoDelta!=null&&<div style={{background:T.inpBg,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:700,color:m.pesoDelta<=0?T.done:"#EF4444"}}>{m.pesoDelta>0?"+":""}{m.pesoDelta}kg</div>
            <div style={{fontSize:10,color:T.muted,marginTop:2}}>variação de peso</div>
          </div>}
        </div>
        {m.mNutriDays>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${T.border}`,fontSize:12}}>
          <span style={{color:T.sub}}>Nutrição em dia</span>
          <span style={{fontWeight:700,color:T.text}}>{m.mNutriOk}/{m.mNutriDays} dias registrados</span>
        </div>}
        {m.bestWeekNum&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:`1px solid ${T.border}`,fontSize:12}}>
          <span style={{color:T.sub}}>Semana mais ativa</span>
          <span style={{fontWeight:700,color:user.accent}}>Semana {m.bestWeekNum} · {m.bestWeekCount} treinos</span>
        </div>}
      </div>);
    })()}

  </div>);
}

  return(
    <div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",
      background:"#0A0A0A",color:"#FFF",padding:"10px 20px",borderRadius:12,
      fontSize:13,fontWeight:600,zIndex:600,display:"flex",alignItems:"center",gap:8,
      boxShadow:"0 4px 24px rgba(0,0,0,0.35)",pointerEvents:"none",whiteSpace:"nowrap"}}>
      <span style={{color:"#4ADE80",fontSize:15}}>✓</span>{msg}
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────────── */
function App(){
  const[uid,setUid]=useState("G");
  const[pillar,setPillar]=useState("home");
  const[toastMsg,setToastMsg]=useState(null);
  const loadCfg=async(id)=>{const c=await sGet(sk(id,"config"),DEF_CFG[id]);const merged={...DEF_CFG[id],...(c||{})};window.__config=merged;return merged;};if(!window.__config)window.__config=DEF_CFG[uid];
  useEffect(()=>{loadCfg(uid);},[uid]);
  const toastRef=useRef(null);
  useEffect(()=>{window.__toast=(msg)=>{setToastMsg(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToastMsg(null),2200);};},[]);
  const[showSettings,setShowSettings]=useState(false);
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem("pf-theme")==="dark";}catch{return false;}});
  T=dark?DARK_T:LIGHT_T;
